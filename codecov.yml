# Codecov configuration
coverage:
  status:
    project:
      default:
        target: auto
        threshold: 5%
        informational: true
      client:
        target: auto
        threshold: 5%
        informational: true
        flags:
          - client
      libs:
        target: auto
        threshold: 5%
        informational: true
        flags:
          - libs
      server:
        target: auto
        threshold: 5%
        informational: true
        flags:
          - server
    patch:
      default:
        target: auto
        threshold: 5%
        informational: true

  precision: 2
  round: down
  range: "0...100"

comment:
  layout: "reach,diff,flags,footer"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

ignore:
  - "tests/**"
  - "scripts/**"
  - "vcpkg/**"
  - "build/**"
  - "build-*/**"
  - "docs/**"
  - "examples/**"
  - "setup/**"
  - "cmake/**"
  - "**/*_test.go"
  - "server/cmd/**"
  - "*.md"
  - "*.yml"
  - "*.yaml"
  - "*.json"
  - "*.toml"

# 语言/模块配置
flags:
  client:
    paths:
      - client/
    carryforward: true
  libs:
    paths:
      - libs/
    carryforward: true
  server:
    paths:
      - server/
    carryforward: true
