# Codecov configuration
coverage:
  status:
    project:
      default:
        target: auto
        threshold: 5%
        informational: true
      windows-cpp:
        target: auto
        threshold: 5%
        informational: true
        flags:
          - windows-cpp
    patch:
      default:
        target: auto
        threshold: 5%
        informational: true

  precision: 2
  round: down
  range: "0...100"

  fixes:
    - "D:/a/wingman/wingman::"

comment:
  layout: "reach,diff,flags,footer"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

ignore:
  - "tests/**"
  - "scripts/**"
  - "vcpkg/**"
  - "build/**"
  - "build-*/**"
  - "**/build/**"
  - "docs/**"
  - "examples/**"
  - "setup/**"
  - "cmake/**"
  - "**/*_test.go"
  - "**/*_test.cpp"
  - "**/*.test.cpp"
  - "**/tests/**"
  - "**/test/**"
  - "*.md"
  - "*.yml"
  - "*.yaml"
  - "*.json"
  - "*.toml"
  - "assets/**"
  - "vcpkg-ports/**"
  - "vcpkg_installed/**"
  - "third_party/**"
  - "third-party/**"

flags:
  windows-cpp:
    paths:
      - apps/
      - lib/
      - libs/
    carryforward: true
