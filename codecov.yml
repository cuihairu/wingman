# Codecov 配置文件
coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 1%
        informational: false
    patch:
      default:
        target: 75%
        threshold: 1%
        informational: false

  # 精确计算，而非抽样
  precision: 2

  # 仅对指定的目录计算覆盖率
  round: down
  range: "70...100"

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

ignore:
  - "tests/**"
  - "scripts/**"
  - "third_party/**"
  - "build/**"
  - "vcpkg/**"
