# Codecov configuration
coverage:
  status:
    project:
      default:
        target: auto
        threshold: 5%
        informational: true
      go:
        target: auto
        threshold: 5%
        informational: true
        flags:
          - go
      cpp:
        target: auto
        threshold: 5%
        informational: true
        flags:
          - cpp
    patch:
      default:
        target: auto
        threshold: 5%
        informational: true

  precision: 2
  round: down
  range: "0...100"

  # 修复: 匹配 Windows 路径中的项目根目录
  # OpenCppCoverage 生成的路径如: C:/Users/runneradmin/runners/.../wingman/apps/...
  # 需要让 codecov 识别这些文件
  fixes:
    - "::"

comment:
  layout: "reach,diff,flags,footer"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

ignore:
  - "tests/**"
  - "scripts/**"
  - "vcpkg/**"
  - "build/**"
  - "build-*/**"
  - "**/build/**"
  - "docs/**"
  - "examples/**"
  - "setup/**"
  - "cmake/**"
  - "**/*_test.go"
  - "**/*_test.cpp"
  - "**/*.test.cpp"
  - "**/tests/**"
  - "**/test/**"
  - "*.md"
  - "*.yml"
  - "*.yaml"
  - "*.json"
  - "*.toml"
  - "assets/**"
  - "vcpkg-ports/**"
  - "vcpkg_installed/**"
  - "third_party/**"
  - "third-party/**"

# 语言/模块配置
flags:
  go:
    paths:
      - orchestrator/server/
    carryforward: true
  cpp:
    paths:
      - apps/
      - lib/
      - libs/
    carryforward: true
