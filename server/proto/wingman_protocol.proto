syntax = "proto3";

package wingman.protocol;

// ========== 错误码 ==========
enum ErrorCode {
  OK = 0;
  ERR_UNKNOWN = 1;
  INVALID_REQUEST = 2;
  NOT_FOUND = 3;
  TIMEOUT = 4;
  ERR_BUSY = 5;
  NOT_AUTHORIZED = 6;
  ALREADY_EXISTS = 7;
  FAILED = 8;
  DISCONNECTED = 9;
  RATE_LIMITED = 10;
}

// ========== 请求类型 ==========
enum RequestType {
  REQ_UNKNOWN = 0;
  // 控制指令
  EXECUTE_SCRIPT = 1;
  STOP_SCRIPT = 2;
  GET_STATUS = 3;
  SCREENSHOT = 4;
  MOUSE_MOVE = 5;
  MOUSE_CLICK = 6;
  KEY_PRESS = 7;
  // 会话管理
  REGISTER = 10;
  HEARTBEAT = 11;
  GET_AGENTS = 12;
  SYNC_TASK = 13;
  SHUTDOWN = 14;
  // 工作流管理
  SUBMIT_WORKFLOW = 20;
  CANCEL_WORKFLOW = 21;
  GET_WORKFLOW = 22;
  GET_NEXT_TASK = 23;
  REPORT_PROGRESS = 24;
  COMPLETE_TASK = 25;
  FAIL_TASK = 26;
}

// ========== Agent 状态 ==========
enum AgentStatus {
  OFFLINE = 0;
  ONLINE = 1;
  IDLE = 2;
  BUSY = 3;
  ERROR = 4;
}

// ========== 资源状态 ==========
message ResourceStats {
  message Cpu {
    double usage = 1;
    int32 cores = 2;
    string model = 3;
  }
  message Memory {
    uint64 total = 1;
    uint64 available = 2;
    double usage = 3;
  }
  message Disk {
    uint64 total = 1;
    uint64 available = 2;
    double usage = 3;
  }
  message Network {
    uint64 up = 1;
    uint64 down = 2;
    string local_ip = 3;
    string public_ip = 4;
  }
  message System {
    double temperature = 1;
    string os = 2;
    string arch = 3;
  }

  Cpu cpu = 1;
  Memory memory = 2;
  Disk disk = 3;
  Network network = 4;
  System system = 5;
  uint64 timestamp = 6;
}

// ========== Agent 信息 ==========
message AgentInfo {
  string agent_id = 1;
  string hostname = 2;
  string ip = 3;
  AgentStatus status = 4;
  string current_task = 5;  // JSON string
  ResourceStats resources = 6;
  uint64 last_seen = 7;
}

// ========== 工作流定义 ==========
message TaskStep {
  string id = 1;
  string name = 2;
  string script = 3;
  repeated string workers = 4;
  repeated string depends_on = 5;
  int32 timeout_seconds = 6;
  string parameters = 7;  // JSON string
}

message Workflow {
  string id = 1;
  string name = 2;
  string description = 3;
  repeated TaskStep steps = 4;
  string shared_context = 5;  // JSON string

  enum Status {
    PENDING = 0;
    RUNNING = 1;
    COMPLETED = 2;
    FAILED = 3;
    CANCELLED = 4;
  }
  Status status = 6;

  uint64 created_time = 7;
  uint64 start_time = 8;
  uint64 end_time = 9;
}

// ========== Worker 状态 ==========
message WorkerStatus {
  string worker_id = 1;
  string step_id = 2;

  enum StepStatus {
    PENDING = 0;
    RUNNING = 1;
    COMPLETED = 2;
    FAILED = 3;
    SKIPPED = 4;
  }
  StepStatus status = 3;
  string progress = 4;  // JSON string
  string message = 5;
  uint64 start_time = 6;
  uint64 end_time = 7;
}

// ========== 请求消息 ==========
message Request {
  RequestType type = 1;
  string id = 2;
  uint64 timestamp = 3;
  string agent_id = 4;
  int32 priority = 5;
  string data = 6;  // JSON string for complex data
}

// ========== 响应消息 ==========
message Response {
  string request_id = 1;
  ErrorCode code = 2;
  uint64 timestamp = 3;
  string message = 4;
  string data = 5;  // JSON string for complex data
}
