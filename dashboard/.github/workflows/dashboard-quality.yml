name: Dashboard Quality

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  dashboard-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - timeout-minutes: 3
        uses: actions/checkout@v4

      - timeout-minutes: 3
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - timeout-minutes: 5
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        timeout-minutes: 5
        run: pnpm install --frozen-lockfile

      - name: Contract guard
        timeout-minutes: 2
        run: |
          test -f src/services/contracts/extensions.ts || (echo "missing generated contracts" && exit 1)
          test -f src/services/errors/codes.ts || (echo "missing error code mapping" && exit 1)

      - name: Check docs and workflow formatting
        timeout-minutes: 5
        run: |
          pnpm exec prettier -c README.md
          pnpm exec prettier -c "docs/**/*.md" ".github/workflows/*.yml"

      - name: Lint dashboard product path
        timeout-minutes: 5
        run: |
          pnpm exec eslint \
            src/components/index.ts \
            src/pages/Console/index.tsx \
            src/pages/DynamicPage/index.tsx \
            src/pages/Functions/Detail.tsx \
            src/pages/Functions/Directory/index.tsx \
            src/pages/WorkspaceEditor/components/ConfigPreview.tsx \
            src/pages/WorkspaceEditor/components/TemplateManager.tsx \
            src/pages/WorkspaceEditor/index.tsx \
            src/pages/Workspaces/Detail.tsx \
            src/pages/Workspaces/index.tsx
