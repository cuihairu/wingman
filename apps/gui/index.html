<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wingman - 游戏自动化引擎</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border-color: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-blue: #58a6ff;
            --accent-yellow: #d29922;
            --accent-orange: #db6d28;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            user-select: none;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* 侧边栏 */
        .sidebar {
            width: 240px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-header h1 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .sidebar-header .logo {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .nav-items {
            flex: 1;
            padding: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 14px;
            transition: all 0.2s;
        }

        .nav-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--bg-tertiary);
            color: var(--accent-blue);
        }

        .nav-item .icon {
            width: 18px;
            height: 18px;
            opacity: 0.8;
        }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid var(--border-color);
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 顶部栏 */
        .top-bar {
            height: 56px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border-radius: 20px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
        }

        .status-dot.connected {
            background: var(--accent-green);
            box-shadow: 0 0 8px rgba(63, 185, 80, 0.5);
        }

        .status-dot.error {
            background: var(--accent-red);
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* 内容区域 */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .page-header {
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .page-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* 卡片 */
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .card-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .card-body {
            padding: 16px;
        }

        /* 状态卡片网格 */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .status-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
        }

        .status-card-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .status-card-value {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .status-card-value.green { color: var(--accent-green); }
        .status-card-value.blue { color: var(--accent-blue); }
        .status-card-value.yellow { color: var(--accent-yellow); }

        /* 按钮 */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--border-color);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--accent-green);
            color: white;
            border-color: var(--accent-green);
        }

        .btn-primary:hover:not(:disabled) {
            background: #2ea043;
        }

        .btn-danger {
            background: var(--accent-red);
            color: white;
            border-color: var(--accent-red);
        }

        .btn-danger:hover:not(:disabled) {
            background: #da3633;
        }

        .btn-warning {
            background: var(--accent-yellow);
            color: var(--bg-primary);
            border-color: var(--accent-yellow);
        }

        .btn-icon {
            padding: 8px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 暂停横幅 */
        .pause-banner {
            background: var(--accent-yellow);
            color: var(--bg-primary);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            display: none;
        }

        .pause-banner.show {
            display: flex;
        }

        /* 脚本列表 */
        .script-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .script-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            transition: all 0.2s;
        }

        .script-item:hover {
            border-color: var(--text-secondary);
        }

        .script-info {
            flex: 1;
        }

        .script-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .script-meta {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            gap: 12px;
        }

        .script-status {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .script-status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-secondary);
        }

        .script-status-dot.running {
            background: var(--accent-green);
        }

        .script-actions {
            display: flex;
            gap: 8px;
        }

        /* 日志区域 */
        .log-container {
            background: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            height: 200px;
            overflow-y: auto;
            padding: 12px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
        }

        .log-entry {
            margin-bottom: 4px;
        }

        .log-time {
            color: var(--text-secondary);
        }

        .log-info { color: var(--accent-blue); }
        .log-success { color: var(--accent-green); }
        .log-warning { color: var(--accent-yellow); }
        .log-error { color: var(--accent-red); }

        /* 输入框 */
        .input {
            padding: 8px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* 设置表单 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        /* 连接配置区域 */
        .connect-config {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .connect-config .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
            }

            .sidebar-header h1,
            .nav-item span {
                display: none;
            }

            .nav-item {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">🎮</div>
                <h1>Wingman</h1>
            </div>
            <div class="nav-items">
                <div class="nav-item active" data-page="dashboard">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span>仪表板</span>
                </div>
                <div class="nav-item" data-page="scripts">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <span>脚本管理</span>
                </div>
                <div class="nav-item" data-page="logs">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                    </svg>
                    <span>日志</span>
                </div>
                <div class="nav-item" data-page="settings">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M12 1v6m0 6v6"></path>
                        <path d="m4.93 4.93 4.24 4.24m5.66 5.66 4.24 4.24"></path>
                        <path d="M1 12h6m6 0h6"></path>
                        <path d="m4.93 19.07 4.24-4.24m5.66-5.66 4.24-4.24"></path>
                    </svg>
                    <span>设置</span>
                </div>
            </div>
            <div class="sidebar-footer">
                <div class="nav-item" id="minimizeBtn">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span>最小化到托盘</span>
                </div>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 暂停横幅 -->
            <div class="pause-banner" id="pauseBanner">
                <span>⏸️ 所有功能已暂停</span>
                <button class="btn btn-primary" id="resumeBannerBtn">恢复运行</button>
            </div>

            <!-- 顶部栏 -->
            <div class="top-bar">
                <div class="top-bar-left">
                    <div class="connection-status">
                        <div class="status-dot" id="connectionDot"></div>
                        <span id="connectionText">未连接</span>
                    </div>
                    <span style="font-size: 13px; color: var(--text-secondary);" id="versionInfo">-</span>
                </div>
                <div class="top-bar-right">
                    <button class="btn btn-warning" id="pauseAllBtn" style="display: none;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="6" y="4" width="4" height="16"></rect>
                            <rect x="14" y="4" width="4" height="16"></rect>
                        </svg>
                        暂停全部
                    </button>
                    <button class="btn btn-icon" id="refreshBtn" title="刷新">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <polyline points="1 20 1 14 7 14"></polyline>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- 内容区域 -->
            <div class="content-area">
                <!-- 仪表板页面 -->
                <div class="page active" id="dashboardPage">
                    <div class="page-header">
                        <h2 class="page-title">仪表板</h2>
                        <p class="page-subtitle">系统运行状态概览</p>
                    </div>

                    <div class="status-grid">
                        <div class="status-card">
                            <div class="status-card-label">运行脚本</div>
                            <div class="status-card-value green" id="runningScriptsCount">0</div>
                        </div>
                        <div class="status-card">
                            <div class="status-card-label">运行时间</div>
                            <div class="status-card-value blue" id="uptimeDisplay">00:00:00</div>
                        </div>
                        <div class="status-card">
                            <div class="status-card-label">系统状态</div>
                            <div class="status-card-value" id="systemStatusText">-</div>
                        </div>
                        <div class="status-card">
                            <div class="status-card-label">内存使用</div>
                            <div class="status-card-value yellow" id="memoryUsage">-</div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <span class="card-title">快速操作</span>
                        </div>
                        <div class="card-body">
                            <div style="display: flex; gap: 12px;">
                                <button class="btn btn-primary" id="quickStartBtn">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                                    </svg>
                                    启动全部
                                </button>
                                <button class="btn btn-danger" id="quickStopBtn">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="6" y="4" width="4" height="16"></rect>
                                        <rect x="14" y="4" width="4" height="16"></rect>
                                    </svg>
                                    停止全部
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 脚本管理页面 -->
                <div class="page" id="scriptsPage">
                    <div class="page-header">
                        <h2 class="page-title">脚本管理</h2>
                        <p class="page-subtitle">管理和控制自动化脚本</p>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <span class="card-title">脚本列表</span>
                        </div>
                        <div class="card-body">
                            <div class="script-list" id="scriptsList">
                                <div class="empty-state">
                                    <div class="empty-state-icon">📜</div>
                                    <div>点击刷新获取脚本列表</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 日志页面 -->
                <div class="page" id="logsPage">
                    <div class="page-header">
                        <h2 class="page-title">系统日志</h2>
                        <p class="page-subtitle">查看运行日志和错误信息</p>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <span class="card-title">实时日志</span>
                            <button class="btn" id="clearLogsBtn" style="font-size: 12px; padding: 4px 8px;">清空</button>
                        </div>
                        <div class="card-body">
                            <div class="log-container" id="logContainer">
                                <div class="log-entry"><span class="log-time">[00:00:00]</span> 等待连接...</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 设置页面 -->
                <div class="page" id="settingsPage">
                    <div class="page-header">
                        <h2 class="page-title">设置</h2>
                        <p class="page-subtitle">配置连接和应用程序选项</p>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <span class="card-title">连接设置</span>
                        </div>
                        <div class="card-body">
                            <div class="form-group">
                                <label class="form-label">WebSocket 服务器地址</label>
                                <div class="connect-config">
                                    <input type="text" class="form-input" id="wsUrlInput" value="ws://127.0.0.1:8080/ws">
                                    <button class="btn btn-primary" id="connectBtn">连接</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <span class="card-title">应用程序</span>
                        </div>
                        <div class="card-body">
                            <div class="form-group">
                                <label class="form-label">启动时最小化到托盘</label>
                                <div>
                                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                        <input type="checkbox" id="minimizeOnStart">
                                        <span style="font-size: 14px;">启用</span>
                                    </label>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">自动重连</label>
                                <div>
                                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                        <input type="checkbox" id="autoReconnect" checked>
                                        <span style="font-size: 14px;">启用</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Tauri API
        const invoke = window.__TAURI_INVOKE__ || window.invoke;
        const listen = window.__TAURI_LISTEN__ || window.listen;

        // 状态
        let isConnected = false;
        let isPaused = false;
        let scripts = [];
        let statusUpdateInterval = null;

        // 工具函数
        function formatUptime(seconds) {
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function getCurrentTime() {
            const now = new Date();
            return `[${now.toTimeString().split(' ')[0]}]`;
        }

        function addLog(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">${getCurrentTime()}</span> <span class="log-${type}">${message}</span>`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        // 更新连接状态
        function updateConnectionStatus(connected) {
            isConnected = connected;
            const dot = document.getElementById('connectionDot');
            const text = document.getElementById('connectionText');
            const pauseBtn = document.getElementById('pauseAllBtn');

            dot.classList.toggle('connected', connected);
            dot.classList.toggle('error', !connected);
            text.textContent = connected ? '已连接' : '未连接';

            pauseBtn.style.display = connected ? 'inline-flex' : 'none';

            if (connected) {
                addLog('已连接到服务器', 'success');
                startStatusUpdates();
            } else {
                addLog('已断开连接', 'warning');
                stopStatusUpdates();
            }
        }

        // 更新暂停状态
        function updatePauseStatus(paused) {
            isPaused = paused;
            const banner = document.getElementById('pauseBanner');
            const pauseBtn = document.getElementById('pauseAllBtn');

            banner.classList.toggle('show', paused);
            pauseBtn.innerHTML = paused ? `
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg> 恢复运行
            ` : `
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="6" y="4" width="4" height="16"></rect>
                    <rect x="14" y="4" width="4" height="16"></rect>
                </svg> 暂停全部
            `;

            addLog(paused ? '所有功能已暂停' : '所有功能已恢复', paused ? 'warning' : 'success');
        }

        // 连接
        async function connect() {
            const url = document.getElementById('wsUrlInput').value;
            try {
                await invoke('connect_websocket', { url });
                updateConnectionStatus(true);
                await loadVersion();
                await loadScripts();
                await updateStatus();
            } catch (error) {
                addLog('连接失败: ' + error, 'error');
                alert('连接失败: ' + error);
            }
        }

        // 断开连接
        async function disconnect() {
            try {
                await invoke('disconnect_websocket');
                updateConnectionStatus(false);
            } catch (error) {
                addLog('断开连接失败: ' + error, 'error');
            }
        }

        // 加载版本信息
        async function loadVersion() {
            try {
                const version = await invoke('get_version');
                document.getElementById('versionInfo').textContent =
                    `${version.server} ${version.version}`;
            } catch (error) {
                console.error('获取版本失败:', error);
            }
        }

        // 加载脚本列表
        async function loadScripts() {
            if (!isConnected) return;

            try {
                const scriptsData = await invoke('get_scripts');
                scripts = scriptsData;
                renderScripts();
            } catch (error) {
                addLog('获取脚本列表失败: ' + error, 'error');
            }
        }

        // 渲染脚本列表
        function renderScripts() {
            const container = document.getElementById('scriptsList');

            if (!scripts || scripts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📜</div>
                        <div>没有找到脚本</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = scripts.map(script => `
                <div class="script-item">
                    <div class="script-info">
                        <div class="script-name">${script.name}</div>
                        <div class="script-meta">
                            <span>${formatSize(script.size)}</span>
                            <div class="script-status">
                                <div class="script-status-dot ${script.is_running ? 'running' : ''}"></div>
                                <span>${script.is_running ? '运行中' : '已停止'}</span>
                            </div>
                        </div>
                    </div>
                    <div class="script-actions">
                        <button class="btn ${script.is_running ? 'btn-danger' : 'btn-primary'}"
                                onclick="toggleScript('${script.id}', ${script.is_running})"
                                style="font-size: 12px; padding: 6px 12px;">
                            ${script.is_running ? '停止' : '启动'}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // 切换脚本状态
        async function toggleScript(id, isRunning) {
            if (!isConnected) {
                addLog('未连接到服务器', 'error');
                return;
            }

            try {
                if (isRunning) {
                    await invoke('stop_script', { scriptId: 'script_' + id });
                    addLog(`已停止脚本: ${id}`, 'info');
                } else {
                    await invoke('start_script', { id });
                    addLog(`已启动脚本: ${id}`, 'success');
                }
                await loadScripts();
                await updateStatus();
            } catch (error) {
                addLog(`操作失败: ${error}`, 'error');
                alert('操作失败: ' + error);
            }
        }

        // 更新状态
        async function updateStatus() {
            if (!isConnected) return;

            try {
                const status = await invoke('get_system_status');
                document.getElementById('runningScriptsCount').textContent = status.running_scripts;
                document.getElementById('uptimeDisplay').textContent = formatUptime(status.uptime);
                document.getElementById('systemStatusText').textContent = status.paused ? '已暂停' : '运行中';
                updatePauseStatus(status.paused);
            } catch (error) {
                console.error('获取状态失败:', error);
            }
        }

        // 开始状态更新
        function startStatusUpdates() {
            stopStatusUpdates();
            statusUpdateInterval = setInterval(async () => {
                if (isConnected) {
                    await updateStatus();
                    await loadScripts();
                }
            }, 3000);
        }

        // 停止状态更新
        function stopStatusUpdates() {
            if (statusUpdateInterval) {
                clearInterval(statusUpdateInterval);
                statusUpdateInterval = null;
            }
        }

        // 暂停/恢复
        async function togglePause() {
            if (!isConnected) return;

            try {
                const paused = await invoke('toggle_pause');
                updatePauseStatus(paused);
                await updateStatus();
            } catch (error) {
                addLog('操作失败: ' + error, 'error');
            }
        }

        // 页面切换
        function switchPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

            document.getElementById(pageName + 'Page').classList.add('active');
            document.querySelector(`[data-page="${pageName}"]`).classList.add('active');
        }

        // 事件绑定
        document.getElementById('connectBtn').addEventListener('click', async () => {
            if (isConnected) {
                await disconnect();
            } else {
                await connect();
            }
        });

        document.getElementById('pauseAllBtn').addEventListener('click', togglePause);
        document.getElementById('resumeBannerBtn').addEventListener('click', togglePause);

        document.getElementById('refreshBtn').addEventListener('click', async () => {
            if (isConnected) {
                await loadScripts();
                await updateStatus();
                addLog('已刷新', 'info');
            }
        });

        document.getElementById('clearLogsBtn').addEventListener('click', () => {
            document.getElementById('logContainer').innerHTML = '';
        });

        document.getElementById('minimizeBtn').addEventListener('click', () => {
            if (typeof invoke !== 'undefined') {
                // 最小化到托盘
                addLog('已最小化到托盘', 'info');
            }
        });

        document.querySelectorAll('.nav-item[data-page]').forEach(item => {
            item.addEventListener('click', () => {
                switchPage(item.dataset.page);
            });
        });

        // 监听托盘事件
        if (typeof listen !== 'undefined') {
            listen('tray-pause', () => {
                togglePause();
            });
        }

        // 初始化
        if (typeof invoke === 'undefined') {
            // 开发模式 - 模拟数据
            updateConnectionStatus(true);
            document.getElementById('versionInfo').textContent = 'wingman 0.1.0 (dev)';
            scripts = [
                { id: 'example', name: 'example.lua', path: 'scripts/example.lua', size: 1024, is_running: true },
                { id: 'test', name: 'test.lua', path: 'scripts/test.lua', size: 512, is_running: false }
            ];
            renderScripts();
            document.getElementById('runningScriptsCount').textContent = '1';
            document.getElementById('uptimeDisplay').textContent = '00:15:32';
            addLog('开发模式已启动', 'info');
        } else {
            // 检查连接状态
            invoke('is_connected').then(connected => {
                if (connected) {
                    updateConnectionStatus(true);
                    loadVersion();
                    loadScripts();
                    updateStatus();
                }
            });

            // 检查暂停状态
            invoke('is_paused').then(paused => {
                updatePauseStatus(paused);
            });
        }
    </script>
</body>
</html>
