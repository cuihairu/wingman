# Wingman Runtime Configuration

# ========== 能力配置（可组合） ==========
enable_remote = true              # 主动连接 Go Orchestrator
enable_local_ipc = true          # 本地 IPC 服务（供 UI 连接）
enable_standalone_script = false # 单机脚本执行

# ========== 远程模式配置 ==========
[remote]
server_ip = "127.0.0.1"
server_port = 9527
reconnect_interval = 5
heartbeat_interval = 30
connect_timeout = 10

# ========== 单机模式配置 ==========
[standalone]
script_dir = "./scripts"

# ========== 调试器配置 ==========
[debugger]
enable = true
listen_port = 9966
wait_for_ide = false

# ========== 日志配置 ==========
[logging]
level = "info"
file = "wingman-agent.log"
console = true
