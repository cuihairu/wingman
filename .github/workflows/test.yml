name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-cache
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-windows:
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Needed for codecov diff coverage

    - name: Cache vcpkg
      id: cache-vcpkg
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.VCPKG_ROOT }}
          vcpkg-cache
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}-${{ hashFiles('.github/workflows/test.yml') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}-
          ${{ runner.os }}-vcpkg-

    - name: Setup vcpkg
      if: steps.cache-vcpkg.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        .\bootstrap-vcpkg.bat

    - name: Create cache directory
      run: New-Item -ItemType Directory -Force -Path "vcpkg-cache" | Out-Null

    - name: Install vcpkg dependencies
      run: |
        $env:VCPKG_ROOT_ABS = (Resolve-Path "vcpkg").Path
        .\vcpkg\vcpkg install --triplet=x64-windows

    - name: Install OpenCppCoverage
      run: |
        choco install opencppcoverage -y

    - name: Configure CMake
      run: |
        $env:VCPKG_ROOT_ABS = (Resolve-Path "vcpkg").Path
        $env:VCPKG_INSTALLED_DIR = "$env:VCPKG_ROOT_ABS\installed"
        cmake -B build `
          -S . `
          -G "Visual Studio 17 2022" `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT_ABS/scripts/buildsystems/vcpkg.cmake" `
          -DCMAKE_BUILD_TYPE=Debug `
          -DWINGMAN_BUILD_TESTS=ON `
          -DWINGMAN_ENABLE_ML=OFF

    - name: Build
      run: cmake --build build --config Debug

    - name: Run tests first (without coverage)
      run: |
        # Run tests to make sure they pass
        & "build\tests\cpp\Debug\wingman_tests.exe" --gtest_brief=1
      continue-on-error: true

    - name: Run tests with coverage
      run: |
        # Find OpenCppCoverage path
        $openCppCoverage = "C:\Program Files\OpenCppCoverage\OpenCppCoverage.exe"
        if (-not (Test-Path $openCppCoverage)) {
          Write-Host "OpenCppCoverage not found at default path"
          # Try alternate path
          $openCppCoverage = "C:\Program Files (x86)\OpenCppCoverage\OpenCppCoverage.exe"
        }

        if (Test-Path $openCppCoverage) {
          Write-Host "Using OpenCppCoverage at: $openCppCoverage"

          # Convert workspace path to Windows format
          $workspace = ${{ github.workspace }}
          $workspace = $workspace -replace '/', '\'

          & $openCppCoverage `
            --sources "$workspace\src" `
            --sources "$workspace\include" `
            --sources "$workspace\bindings" `
            --excluded_sources "$workspace\tests" `
            --excluded_sources "$workspace\vcpkg" `
            --export_type=cobertura:coverage.xml `
            -- build\tests\cpp\Debug\wingman_tests.exe --gtest_brief=1
        } else {
          Write-Host "ERROR: OpenCppCoverage not installed"
          exit 1
        }

        # Check if coverage file was generated
        if (Test-Path "coverage.xml") {
          Write-Host "Coverage file generated successfully"
          (Get-Content coverage.xml) | Select-Object -First 5
        } else {
          Write-Host "WARNING: coverage.xml not found"
          Get-ChildItem -Filter *.xml | Select-Object Name
        }

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: cpp
        name: windows-coverage
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
        verbose: true

    - name: Run Lua tests
      shell: pwsh
      run: |
        # 跳过 Lua 测试（需要 LuaRocks，属于开发工具）
        Write-Host "Skipping Lua tests (LuaRocks is optional dev tool)"
        # 如需运行 Lua 测试，开发者本地执行：
        # 1. 安装 LuaRocks (scripts/install-luarocks.cmd)
        # 2. 安装 Busted (luarocks install busted)
        # 3. 运行测试 (busted tests -o utfTerminal)
