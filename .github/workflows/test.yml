name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-cache
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-windows:
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup vcpkg
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        .\bootstrap-vcpkg.bat

    - name: Cache vcpkg packages
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.VCPKG_ROOT }}/packages
          ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-

    - name: Create cache directory
      run: New-Item -ItemType Directory -Force -Path "vcpkg-cache" | Out-Null

    - name: Install vcpkg dependencies
      run: |
        $env:VCPKG_ROOT_ABS = (Resolve-Path "vcpkg").Path
        .\vcpkg\vcpkg install --triplet=x64-windows

    - name: Configure CMake
      run: |
        $env:VCPKG_ROOT_ABS = (Resolve-Path "vcpkg").Path
        $env:VCPKG_INSTALLED_DIR = "$env:VCPKG_ROOT_ABS\installed"
        cmake -B build `
          -S . `
          -G "Visual Studio 17 2022" `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT_ABS/scripts/buildsystems/vcpkg.cmake" `
          -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Install LuaRocks and busted
      run: |
        # 下载 LuaRocks (使用官方 GitHub Releases)
        Invoke-WebRequest -Uri "https://github.com/luarocks/luarocks/releases/download/v3.11.1/luarocks-3.11.1-windows-64.zip" -OutFile "luarocks.zip"
        Expand-Archive -Path "luarocks.zip" -DestinationPath .
        Move-Item luarocks-3.11.1-windows-64 luarocks
        $env:PATH = "$((Get-Location).Path)\luarocks;$env:PATH"
        # 安装 busted
        luarocks install busted

    - name: Run Lua tests
      shell: pwsh
      run: |
        $env:PATH = "$((Get-Location).Path)\luarocks;$((Get-Location).Path)\build\Release;$env:PATH"
        busted tests -o utfTerminal
