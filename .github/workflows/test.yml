name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-cache
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-windows:
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Needed for codecov diff coverage

    - name: Setup vcpkg
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        .\bootstrap-vcpkg.bat

    - name: Cache vcpkg packages
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.VCPKG_ROOT }}/packages
          ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-

    - name: Create cache directory
      run: New-Item -ItemType Directory -Force -Path "vcpkg-cache" | Out-Null

    - name: Install vcpkg dependencies
      run: |
        $env:VCPKG_ROOT_ABS = (Resolve-Path "vcpkg").Path
        .\vcpkg\vcpkg install --triplet=x64-windows

    - name: Install OpenCppCoverage
      run: |
        choco install opencppcoverage -y

    - name: Configure CMake
      run: |
        $env:VCPKG_ROOT_ABS = (Resolve-Path "vcpkg").Path
        $env:VCPKG_INSTALLED_DIR = "$env:VCPKG_ROOT_ABS\installed"
        cmake -B build `
          -S . `
          -G "Visual Studio 17 2022" `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT_ABS/scripts/buildsystems/vcpkg.cmake" `
          -DCMAKE_BUILD_TYPE=Debug `
          -DWINGMAN_BUILD_TESTS=ON

    - name: Build
      run: cmake --build build --config Debug

    - name: Run tests with coverage
      run: |
        # Run tests with OpenCppCoverage
        & "C:\Program Files\OpenCppCoverage\OpenCppCoverage.exe" `
          --sources "${{ github.workspace }}/src" `
          --sources "${{ github.workspace }}/include" `
          --sources "${{ github.workspace }}/bindings" `
          --excluded_sources "${{ github.workspace }}/tests" `
          --export_type=cobertura:coverage.xml `
          -- build\tests\cpp\Debug\wingman_tests.exe

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: cpp
        name: windows-coverage
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Run Lua tests
      shell: pwsh
      run: |
        # 跳过 Lua 测试（需要 LuaRocks，属于开发工具）
        Write-Host "Skipping Lua tests (LuaRocks is optional dev tool)"
        # 如需运行 Lua 测试，开发者本地执行：
        # 1. 安装 LuaRocks (scripts/install-luarocks.cmd)
        # 2. 安装 Busted (luarocks install busted)
        # 3. 运行测试 (busted tests -o utfTerminal)
