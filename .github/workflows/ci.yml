name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

# GitHub Packages 权限（用于 vcpkg 二进制缓存）
permissions:
  packages: write

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg/archives
  # GitHub Packages NuGet 源配置
  USERNAME: ${{ github.repository_owner }}
  VCPKG_EXE: ${{ github.workspace }}/vcpkg/vcpkg
  FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
  VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,readwrite"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ========== C++ Build & Test ==========
  build-cpp:
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    # Cache vcpkg binary archives for faster builds
    - name: Cache vcpkg binaries
      uses: actions/cache@v5
      with:
        path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-

    - name: Setup vcpkg
      run: |
        Write-Host "Cloning vcpkg..."
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        .\bootstrap-vcpkg.bat

    - name: Add NuGet sources (GitHub Packages)
      run: |
        # 使用 PAT 进行认证（需要在 repository secrets 中配置 VCPKG_PAT_TOKEN）
        # 如果没有配置 PAT，则使用 GITHUB_TOKEN（权限可能受限）
        $patToken = "${{ secrets.VCPKG_PAT_TOKEN }}"
        if ([string]::IsNullOrEmpty($patToken)) {
          Write-Host "VCPKG_PAT_TOKEN not found, using GITHUB_TOKEN (may have limited permissions)"
          $patToken = "${{ github.token }}"
        }

        # 添加 GitHub Packages 作为 NuGet 源
        .\vcpkg\vcpkg fetch nuget | ForEach-Object { & $_ sources add `
          -Source "${{ env.FEED_URL }}" `
          -StorePasswordInClearText `
          -Name "GitHubPackages" `
          -UserName "${{ env.USERNAME }}" `
          -Password $patToken }

        # 设置 API key
        .\vcpkg\vcpkg fetch nuget | ForEach-Object { & $_ setapikey $patToken -Source "${{ env.FEED_URL }}" }

    - name: Install dependencies
      run: |
        # 使用官方推荐的 binary cache 配置
        $env:VCPKG_BINARY_SOURCES = "${{ env.VCPKG_BINARY_SOURCES }}"
        New-Item -ItemType Directory -Force -Path "${{ env.VCPKG_DEFAULT_BINARY_CACHE }}"
        # 启用 tests feature 来安装 GTest
        .\vcpkg\vcpkg install --triplet=x64-windows-static --recurse --x-feature=tests

    - name: Verify GTest installation
      run: |
        Write-Host "Checking GTest installation..."
        $gtestPath = "vcpkg\installed\x64-windows-static\share\gtest"
        if (Test-Path $gtestPath) {
          Write-Host "GTest directory exists: $gtestPath"
          Get-ChildItem $gtestPath
        } else {
          Write-Host "GTest directory NOT found at: $gtestPath"
          Write-Host "Checking vcpkg\packages directory..."
          Get-ChildItem "vcpkg\packages" -Filter "*gtest*" | Select-Object -First 5
        }

    - name: Configure CMake
      run: |
        $env:VCPKG_ROOT_ABS = (Resolve-Path "vcpkg").Path
        # 确保 vcpkg 能找到所有已安装的包
        $env:CMAKE_PREFIX_PATH = "vcpkg\installed\x64-windows-static"
        cmake -B build `
          -S . `
          -G "Visual Studio 17 2022" `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT_ABS/scripts/buildsystems/vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=x64-windows-static `
          -DCMAKE_BUILD_TYPE=Debug `
          -DWINGMAN_BUILD_TESTS=ON `
          -DBUILD_CORE_TESTS=ON `
          -DWINGMAN_BUILD_GUI=OFF

    - name: Build
      run: cmake --build build --config Debug

    - name: Upload test artifacts
      uses: actions/upload-artifact@v6
      with:
        name: cpp-tests
        path: |
          build/client/tests/Debug/*.exe
          build/libs/*/tests/Debug/*.exe
        retention-days: 1

  test-cpp:
    needs: build-cpp
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install OpenCppCoverage
      run: choco install opencppcoverage -y

    - name: Download test artifacts
      uses: actions/download-artifact@v6
      with:
        name: cpp-tests
        path: build/tests

    - name: Run client tests with coverage
      run: |
        $openCppCoverage = "C:\Program Files\OpenCppCoverage\OpenCppCoverage.exe"
        if (-not (Test-Path $openCppCoverage)) {
          $openCppCoverage = "C:\Program Files (x86)\OpenCppCoverage\OpenCppCoverage.exe"
        }

        $workspace = ${{ github.workspace }}
        $workspace = $workspace -replace '/', '\'

        & $openCppCoverage `
          --sources "$workspace\client" `
          --excluded_sources "$workspace\client\tests" `
          --excluded_sources "$workspace\vcpkg" `
          --export_type=cobertura:coverage-client.xml `
          -- build/tests/client_tests.exe
        continue-on-error: true

    - name: Run libs tests with coverage
      run: |
        $openCppCoverage = "C:\Program Files\OpenCppCoverage\OpenCppCoverage.exe"
        if (-not (Test-Path $openCppCoverage)) {
          $openCppCoverage = "C:\Program Files (x86)\OpenCppCoverage\OpenCppCoverage.exe"
        }

        $workspace = ${{ github.workspace }}
        $workspace = $workspace -replace '/', '\'

        & $openCppCoverage `
          --sources "$workspace\libs" `
          --excluded_sources "$workspace\libs\*\tests" `
          --excluded_sources "$workspace\vcpkg" `
          --export_type=cobertura:coverage-libs.xml `
          -- build/tests/core_tests.exe
        continue-on-error: true

        & $openCppCoverage `
          --sources "$workspace\libs" `
          --excluded_sources "$workspace\libs\*\tests" `
          --excluded_sources "$workspace\vcpkg" `
          --export_type=cobertura:coverage-transport.xml `
          -- build/tests/transport_tests.exe
        continue-on-error: true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: |
          ./coverage-client.xml
          ./coverage-libs.xml
          ./coverage-transport.xml
        flags: client,libs
        name: cpp-coverage
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  # ========== Lua Tests ==========
  test-lua:
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install Lua
      run: |
        choco install lua -y
        # Lua 5.4 from Chocolatey (vcpkg lua is also 5.4.x)
        # Lua 5.5 binaries not available on Chocolatey yet
        $luaPath = "C:\Program Files\Lua\5.4"
        if (Test-Path $luaPath) {
            Write-Host "Lua found at: $luaPath"
            Get-ChildItem $luaPath
            echo "$luaPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        } else {
            Write-Host "Lua not found at $luaPath, searching..."
            Get-ChildItem "C:\Program Files" -Recurse -Filter "lua.exe" -ErrorAction SilentlyContinue | Select-Object -First 5
        }

    - name: Install LuaRocks
      run: |
        Invoke-WebRequest -Uri "https://luarocks.github.io/luarocks/releases/luarocks-3.13.0-windows-64.zip" -OutFile luarocks.zip
        Expand-Archive luarocks.zip -DestinationPath .
        Move-Item luarocks-3.13.0-windows-64 C:\luarocks
        echo "C:\luarocks" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        echo "C:\luarocks\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Install Busted
      run: |
        # 直接使用完整路径
        $luaPath = "C:\Program Files\Lua\5.4"
        if (Test-Path "$luaPath\lua.exe") {
            & "$luaPath\lua.exe" -v
            & "C:\luarocks\bin\luarocks.exe" install busted
        } else {
            Write-Host "ERROR: lua.exe not found at $luaPath"
            exit 1
        }

    - name: Run Lua tests
      run: |
        # 直接使用完整路径
        $luaPath = "C:\Program Files\Lua\5.4"
        $env:PATH = "$luaPath;C:\luarocks\bin;C:\luarocks;$env:PATH"
        cd libs/lua/tests
        & "C:\luarocks\bin\busted.exe"
      continue-on-error: true

  # ========== Go Test ==========
  test-go:
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Run Go tests
      run: |
        cd server
        go test -v -coverprofile=coverage.txt -covermode=atomic ./...
      continue-on-error: true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./server/coverage.txt
        flags: server
        name: go-coverage
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
