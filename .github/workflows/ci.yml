name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

# GitHub Packages 权限（用于 vcpkg 二进制缓存）
permissions:
  packages: write
  contents: read

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg/archives
  # GitHub Packages NuGet 源配置
  USERNAME: ${{ github.repository_owner }}
  VCPKG_EXE: ${{ github.workspace }}/vcpkg/vcpkg
  FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
  VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,readwrite"

jobs:
  # ========== C++ Build & Test ==========
  build-cpp:
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    # Cache vcpkg binary archives for faster builds
    - name: Cache vcpkg binaries
      uses: actions/cache@v5
      with:
        path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-

    - name: Setup vcpkg
      run: |
        if (Test-Path "vcpkg") {
          Write-Host "vcpkg directory exists, removing..."
          Remove-Item -Recurse -Force vcpkg
        }
        Write-Host "Cloning vcpkg..."
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        .\bootstrap-vcpkg.bat

    - name: Add NuGet sources (GitHub Packages)
      run: |
        # 使用 PAT 进行认证（需要在 repository secrets 中配置 VCPKG_PAT_TOKEN）
        # 如果没有配置 PAT，则使用 GITHUB_TOKEN（权限可能受限）
        $patToken = "${{ secrets.VCPKG_PAT_TOKEN }}"
        if ([string]::IsNullOrEmpty($patToken)) {
          Write-Host "VCPKG_PAT_TOKEN not found, using GITHUB_TOKEN (may have limited permissions)"
          $patToken = "${{ github.token }}"
        }

        # 添加 GitHub Packages 作为 NuGet 源
        .\vcpkg\vcpkg fetch nuget | ForEach-Object { & $_ sources add `
          -Source "${{ env.FEED_URL }}" `
          -StorePasswordInClearText `
          -Name "GitHubPackages" `
          -UserName "${{ env.USERNAME }}" `
          -Password $patToken }

        # 设置 API key
        .\vcpkg\vcpkg fetch nuget | ForEach-Object { & $_ setapikey $patToken -Source "${{ env.FEED_URL }}" }

    - name: Clone clasp for overlay port
      run: |
        # clasp portfile 会检查本地路径，如果存在则使用本地版本
        # 这样避免需要 REF + SHA512 或 --head 标志
        $workspacesDir = "$env:USERPROFILE\Workspaces"
        New-Item -ItemType Directory -Force -Path $workspacesDir
        if (-not (Test-Path "$workspacesDir\clasp")) {
            git clone https://github.com/cuihairu/clasp.git "$workspacesDir\clasp"
        }

    - name: Install dependencies
      run: |
        # 使用官方推荐的 binary cache 配置
        $env:VCPKG_BINARY_SOURCES = "${{ env.VCPKG_BINARY_SOURCES }}"
        New-Item -ItemType Directory -Force -Path "${{ env.VCPKG_DEFAULT_BINARY_CACHE }}"
        # 启用 tests feature 来安装 GTest
        # 在 manifest 模式下，不需要指定包名，只需使用 --x-feature=tests
        # 添加 overlay-ports 以使用自定义端口 (clasp)
        .\vcpkg\vcpkg install --triplet=x64-windows-static --recurse --x-feature=tests --overlay-ports=vcpkg-ports

    - name: Configure CMake
      shell: cmd
      run: |
        set "VCPKG_ROOT_ABS=%CD%\vcpkg"
        set "VCPKG_OVERLAY_PORTS=%CD%\vcpkg-ports"
        cmake -B build ^
          -S . ^
          -G "Visual Studio 17 2022" ^
          -A x64 ^
          -DCMAKE_TOOLCHAIN_FILE="%VCPKG_ROOT_ABS%/scripts/buildsystems/vcpkg.cmake" ^
          -DVCPKG_TARGET_TRIPLET=x64-windows-static ^
          -DCMAKE_BUILD_TYPE=Debug ^
          -DWINGMAN_BUILD_TESTS=ON ^
          -DBUILD_CORE_TESTS=ON ^
          -DWINGMAN_BUILD_GUI=OFF

    - name: Build
      run: cmake --build build --config Debug

    - name: Upload test artifacts
      uses: actions/upload-artifact@v6
      with:
        name: cpp-tests
        path: |
          build/lib/wingman/tests/Debug/*.exe
          build/**/Debug/*_tests.exe
          build/**/Debug/core_tests.exe
        if-no-files-found: warn
        retention-days: 1

  test-cpp:
    needs: build-cpp
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Download test artifacts
      uses: actions/download-artifact@v8
      with:
        name: cpp-tests
        path: build/tests

    - name: Run tests
      run: |
        Get-ChildItem -Recurse build/tests -Filter "*.exe" | ForEach-Object {
          Write-Host "Running $($_.FullName)..."
          & $_.FullName
        }

  # ========== Lua Tests ==========
  # NOTE: 暂时禁用 - Lua 测试需要 C++ 绑定，需要先实现测试运行器
  # 测试文件位于 libs/lua/tests/unit/，测试的是 C++ 暴露给 Lua 的 API
  # 需要一个能加载 wingman_lua 库的测试环境才能运行
  test-lua:
    if: false
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install Lua with scoop
      run: |
        # 安装 scoop（如果尚未安装）
        irm get.scoop.sh | iex
        scoop install lua

    - name: Download and install LuaRocks
      run: |
        Invoke-WebRequest -Uri "https://luarocks.github.io/luarocks/releases/luarocks-3.13.0-windows-64.zip" -OutFile luarocks.zip
        Expand-Archive luarocks.zip -DestinationPath .
        Move-Item luarocks-3.13.0-windows-64 C:\luarocks

    - name: Install Busted and run tests
      shell: pwsh
      run: |
        # 使用实际的 Lua 可执行文件（不是 shim）
        $luaExe = "$env:USERPROFILE\scoop\apps\lua\current\bin\lua.exe"
        Write-Host "Lua found at: $luaExe"

        # 配置 LuaRocks 使用实际的 Lua
        & "C:\luarocks\luarocks.exe" --local config variables.Lua $luaExe

        # 安装 Busted
        & "C:\luarocks\luarocks.exe" install busted

        # 运行测试（指定 unit 目录）
        cd libs/lua/tests
        & "$env:USERPROFILE\AppData\Roaming\luarocks\bin\busted.bat" --directory=unit --recursive

  # ========== Go Test ==========
  test-go:
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: 'stable'
        cache: false

    - name: Initialize Go module
      working-directory: orchestrator/server
      run: |
        go mod init github.com/cuihaitao/wingman/orchestrator/server || true
        go mod tidy

    - name: Run Go tests
      shell: bash
      working-directory: orchestrator/server
      run: |
        go test -v -coverprofile=coverage.txt -covermode=atomic ./...

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v6
      with:
        name: go-coverage
        path: orchestrator/server/coverage.txt
        retention-days: 1

  # ========== Codecov Upload ==========
  # 使用 Ubuntu 避免 Windows 编码问题
  codecov:
    needs: test-go
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Download coverage artifact
      uses: actions/download-artifact@v8
      with:
        name: go-coverage
        path: orchestrator/server/

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./orchestrator/server/coverage.txt
        flags: go
        name: codecov-umbrella
        fail_ci_if_error: false
