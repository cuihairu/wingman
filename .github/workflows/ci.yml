name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  ACTIONS_NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg

jobs:
  cpp-windows:
    name: C++ Windows
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup vcpkg
        run: ./build-scripts/ci/setup-vcpkg.ps1

      - name: Configure CMake
        run: ./build-scripts/ci/configure-windows.ps1 -BuildDir build -Config Debug -EnableTests

      - name: Build
        run: cmake --build build --config Debug --parallel

      - name: Install OpenCppCoverage
        run: choco install opencppcoverage -y --no-progress

      - name: Run tests with coverage
        run: ./build-scripts/ci/run-windows-coverage.ps1 -BuildDir build -Config Debug -CoverageFile build/coverage/coverage.cobertura.xml -TimeoutSeconds 180
        timeout-minutes: 60

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-cpp-coverage
          path: build/coverage/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 7

      - name: Upload coverage to Codecov
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@v5.5.1
        with:
          files: build/coverage/coverage.cobertura.xml
          flags: windows-cpp
          name: windows-cpp
          fail_ci_if_error: true
          use_oidc: true

  cpp-compat:
    name: C++ ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            triplet: x64-linux
          - os: macos-15-intel
            triplet: x64-osx
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libx11-dev libxrandr-dev libxext-dev libxtst-dev libxinerama-dev ninja-build

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Setup vcpkg
        run: bash ./build-scripts/ci/setup-vcpkg.sh

      - name: Configure CMake
        run: bash ./build-scripts/ci/configure-unix.sh "${{ matrix.triplet }}" "Ninja" "build"

      - name: Build
        run: cmake --build build --parallel --target wingman_proto wingman_transport

  go-build:
    name: Go Server
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: orchestrator/server/go.sum

      - name: Test
        working-directory: orchestrator/server
        run: go test ./...
