name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Cache vcpkg entire directory
      uses: actions/cache@v5
      id: vcpkg-cache
      with:
        path: |
          ${{ env.VCPKG_ROOT }}
          vcpkg/archives
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-

    - name: Setup vcpkg
      if: steps.vcpkg-cache.outputs.cache-hit != 'true'
      run: |
        Write-Host "克隆 vcpkg..."
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        .\bootstrap-vcpkg.bat

    - name: Install vcpkg dependencies
      run: |
        $env:VCPKG_ROOT_ABS = (Resolve-Path "vcpkg").Path
        # 使用默认的二进制缓存（会自动使用 GitHub Actions 缓存的 vcpkg 目录）
        # 默认缓存位置: %LOCALAPPDATA%\vcpkg\archives
        $env:VCPKG_DEFAULT_BINARY_CACHE = "$env:VCPKG_ROOT_ABS\archives"
        New-Item -ItemType Directory -Force -Path "$env:VCPKG_DEFAULT_BINARY_CACHE"
        Write-Host "使用本地二进制缓存: $env:VCPKG_DEFAULT_BINARY_CACHE"
        .\vcpkg\vcpkg install --triplet=x64-windows

    - name: Cache vcpkg binaries
      uses: actions/cache@v5
      with:
        path: vcpkg/archives
        key: ${{ runner.os }}-vcpkg-binaries-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-binaries-

    - name: Configure CMake (Debug)
      run: |
        $env:VCPKG_ROOT_ABS = (Resolve-Path "vcpkg").Path
        $env:VCPKG_INSTALLED_DIR = "$env:VCPKG_ROOT_ABS\installed"
        cmake -B build-debug `
          -S . `
          -G "Visual Studio 17 2022" `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT_ABS/scripts/buildsystems/vcpkg.cmake" `
          -DCMAKE_BUILD_TYPE=Debug `
          -DWINGMAN_BUILD_TESTS=ON `
          -DWINGMAN_ENABLE_ML=OFF

    - name: Build Debug
      run: cmake --build build-debug --config Debug

    - name: Configure CMake (Release)
      run: |
        $env:VCPKG_ROOT_ABS = (Resolve-Path "vcpkg").Path
        $env:VCPKG_INSTALLED_DIR = "$env:VCPKG_ROOT_ABS\installed"
        cmake -B build-release `
          -S . `
          -G "Visual Studio 17 2022" `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT_ABS/scripts/buildsystems/vcpkg.cmake" `
          -DCMAKE_BUILD_TYPE=Release

    - name: Build Release
      run: cmake --build build-release --config Release

    - name: Upload Debug artifacts
      uses: actions/upload-artifact@v6
      with:
        name: wingman-debug
        path: build-debug/Debug/wingman.exe
        retention-days: 1

    - name: Upload test artifacts
      uses: actions/upload-artifact@v6
      with:
        name: wingman-tests
        path: build-debug/tests/cpp/Debug/wingman_tests.exe
        retention-days: 1

    - name: Upload Release artifacts
      uses: actions/upload-artifact@v6
      with:
        name: wingman-release
        path: build-release/Release/wingman.exe

  test:
    needs: build
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install OpenCppCoverage
      run: choco install opencppcoverage -y

    - name: Cache vcpkg entire directory
      uses: actions/cache@v5
      id: vcpkg-cache
      with:
        path: |
          ${{ env.VCPKG_ROOT }}
          vcpkg/archives
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
        fail-on-cache-miss: false

    - name: Setup vcpkg (if cache miss)
      if: steps.vcpkg-cache.outputs.cache-hit != 'true'
      run: |
        Write-Host "克隆 vcpkg"
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        .\bootstrap-vcpkg.bat

    - name: Download test artifacts
      uses: actions/download-artifact@v6
      with:
        name: wingman-tests
        path: build-debug/tests/cpp/Debug

    - name: Run tests
      run: |
        & "build-debug\tests\cpp\Debug\wingman_tests.exe" --gtest_brief=1
      continue-on-error: true

    - name: Run tests with coverage
      run: |
        $openCppCoverage = "C:\Program Files\OpenCppCoverage\OpenCppCoverage.exe"
        if (-not (Test-Path $openCppCoverage)) {
          $openCppCoverage = "C:\Program Files (x86)\OpenCppCoverage\OpenCppCoverage.exe"
        }

        if (Test-Path $openCppCoverage) {
          $workspace = ${{ github.workspace }}
          $workspace = $workspace -replace '/', '\'

          & $openCppCoverage `
            --sources "$workspace\src" `
            --sources "$workspace\include" `
            --sources "$workspace\bindings" `
            --excluded_sources "$workspace\tests" `
            --excluded_sources "$workspace\vcpkg" `
            --export_type=cobertura:coverage.xml `
            -- build-debug\tests\cpp\Debug\wingman_tests.exe --gtest_brief=1
        } else {
          Write-Host "ERROR: OpenCppCoverage not installed"
          exit 1
        }

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: cpp
        name: windows-coverage
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
