name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

# GitHub Packages 权限（用于 vcpkg 二进制缓存）
permissions:
  packages: write
  contents: read

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg/archives
  # GitHub Packages NuGet 源配置
  USERNAME: ${{ github.repository_owner }}
  VCPKG_EXE: ${{ github.workspace }}/vcpkg/vcpkg
  FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
  VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,readwrite"

jobs:
  # ========== C++ Build & Test ==========
  build-cpp:
    runs-on: windows-2025-vs2026

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    # Cache vcpkg binary archives for faster builds
    - name: Cache vcpkg binaries
      uses: actions/cache@v5
      with:
        path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-

    - name: Setup vcpkg
      run: |
        if (Test-Path "vcpkg") {
          Write-Host "vcpkg directory exists, removing..."
          Remove-Item -Recurse -Force vcpkg
        }
        Write-Host "Cloning vcpkg..."
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        .\bootstrap-vcpkg.bat

    - name: Add NuGet sources (GitHub Packages)
      run: |
        # 使用 PAT 进行认证（需要在 repository secrets 中配置 VCPKG_PAT_TOKEN）
        # 如果没有配置 PAT，则使用 GITHUB_TOKEN（权限可能受限）
        $patToken = "${{ secrets.VCPKG_PAT_TOKEN }}"
        if ([string]::IsNullOrEmpty($patToken)) {
          Write-Host "VCPKG_PAT_TOKEN not found, using GITHUB_TOKEN (may have limited permissions)"
          $patToken = "${{ github.token }}"
        }

        # 添加 GitHub Packages 作为 NuGet 源
        .\vcpkg\vcpkg fetch nuget | ForEach-Object { & $_ sources add `
          -Source "${{ env.FEED_URL }}" `
          -StorePasswordInClearText `
          -Name "GitHubPackages" `
          -UserName "${{ env.USERNAME }}" `
          -Password $patToken }

        # 设置 API key
        .\vcpkg\vcpkg fetch nuget | ForEach-Object { & $_ setapikey $patToken -Source "${{ env.FEED_URL }}" }

    - name: Install dependencies
      run: |
        # 使用官方推荐的 binary cache 配置
        $env:VCPKG_BINARY_SOURCES = "${{ env.VCPKG_BINARY_SOURCES }}"
        New-Item -ItemType Directory -Force -Path "${{ env.VCPKG_DEFAULT_BINARY_CACHE }}"
        # 启用 tests feature 来安装 GTest
        # 在 manifest 模式下，不需要指定包名，只需使用 --x-feature=tests
        .\vcpkg\vcpkg install --triplet=x64-windows-static --recurse --x-feature=tests

    - name: Configure CMake
      run: |
        $env:VCPKG_ROOT_ABS = (Resolve-Path "vcpkg").Path
        cmake -B build `
          -S . `
          -G "Visual Studio 17 2022" `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT_ABS/scripts/buildsystems/vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=x64-windows-static `
          -DCMAKE_BUILD_TYPE=Debug `
          -DWINGMAN_BUILD_TESTS=ON `
          -DBUILD_CORE_TESTS=ON `
          -DWINGMAN_BUILD_GUI=OFF

    - name: Build
      run: cmake --build build --config Debug

    - name: Upload test artifacts
      uses: actions/upload-artifact@v6
      with:
        name: cpp-tests
        path: |
          build/lib/wingman/tests/Debug/*.exe
          build/**/Debug/*_tests.exe
          build/**/Debug/core_tests.exe
        if-no-files-found: warn
        retention-days: 1

  test-cpp:
    needs: build-cpp
    runs-on: windows-2025-vs2026

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Download test artifacts
      uses: actions/download-artifact@v6
      with:
        name: cpp-tests
        path: build/tests

    - name: Run tests
      run: |
        Get-ChildItem -Recurse build/tests -Filter "*.exe" | ForEach-Object {
          Write-Host "Running $($_.FullName)..."
          & $_.FullName
        }

  # ========== Lua Tests ==========
  test-lua:
    runs-on: windows-2025-vs2026

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup vcpkg and install Lua
      run: |
        # 不使用 GitHub Packages 缓存，直接安装
        if (Test-Path "vcpkg") {
          Remove-Item -Recurse -Force vcpkg
        }
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        .\bootstrap-vcpkg.bat

        # 创建缓存目录（在 vcpkg 目录内）
        New-Item -ItemType Directory -Force -Path "archives" | Out-Null

        cd ..
        # 使用 classic 模式安装 Lua
        .\vcpkg\vcpkg install --classic --triplet=x64-windows-static lua

    - name: Download and install LuaRocks
      run: |
        # 下载并安装 LuaRocks
        Invoke-WebRequest -Uri "https://luarocks.github.io/luarocks/releases/luarocks-3.13.0-windows-64.zip" -OutFile luarocks.zip
        Expand-Archive luarocks.zip -DestinationPath .
        Move-Item luarocks-3.13.0-windows-64 C:\luarocks

        # 添加 Lua 到 PATH
        $luaPath = "vcpkg\installed\x64-windows-static\tools\lua"
        if (Test-Path "$luaPath\lua.exe") {
          "$luaPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        }

        # 添加 LuaRocks 到 PATH
        "C:\luarocks" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Find Lua executable
      shell: pwsh
      run: |
        # 打印 vcpkg 安装目录结构
        Write-Host "=== vcpkg\installed 目录结构 ==="
        if (Test-Path "vcpkg\installed") {
          Get-ChildItem -Recurse vcpkg\installed -Directory | Select-Object -First 20 FullName
        } else {
          Write-Host "vcpkg\installed directory not found!"
        }

        # 搜索所有 lua.exe
        Write-Host "=== 搜索 lua.exe ==="
        Get-ChildItem -Recurse vcpkg -Filter lua.exe -ErrorAction SilentlyContinue | ForEach-Object {
          Write-Host "Found: $($_.FullName)"
        }

    - name: Install Busted and run tests
      shell: pwsh
      run: |
        # 查找 lua.exe 的实际位置
        $luaExe = Get-ChildItem -Recurse vcpkg\installed -Filter lua.exe -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName

        if (-not $luaExe) {
          Write-Error "Lua not found in vcpkg\installed"
          exit 1
        }

        Write-Host "Using Lua: $luaExe"

        # 检查 LuaRocks 是否存在
        if (-not (Test-Path "C:\luarocks\luarocks.exe")) {
          Write-Error "LuaRocks not found at C:\luarocks\luarocks.exe"
          exit 1
        }

        # 配置 LuaRocks 使用找到的 Lua
        & "C:\luarocks\luarocks.exe" --local config variables.LUA $luaExe

        # 安装 Busted
        & "C:\luarocks\luarocks.exe" install busted

        # 运行测试
        cd libs/lua/tests
        & "C:\luarocks\bin\busted.bat"

  # ========== Go Test ==========
  test-go:
    runs-on: windows-2025-vs2026

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: 'stable'
        cache: false

    - name: Initialize Go module
      working-directory: server
      run: |
        go mod init github.com/cuihaitao/wingman/server || true
        go mod tidy

    - name: Run Go tests
      shell: bash
      working-directory: server
      run: |
        go test -v -coverprofile=coverage.txt -covermode=atomic ./...
