name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: read

env:
  ACTIONS_NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg/archives
  USERNAME: ${{ github.repository_owner }}
  VCPKG_EXE: ${{ github.workspace }}/vcpkg/vcpkg
  FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
  VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,readwrite"

jobs:
  cpp-windows:
    name: C++ Windows
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache vcpkg binaries
        uses: actions/cache@v5
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Setup vcpkg
        run: ./build-scripts/ci/setup-vcpkg.ps1

      - name: Add NuGet sources (GitHub Packages)
        run: |
          $patToken = "${{ secrets.VCPKG_PAT_TOKEN }}"
          if ([string]::IsNullOrEmpty($patToken)) {
            Write-Host "VCPKG_PAT_TOKEN not found, using GITHUB_TOKEN"
            $patToken = "${{ github.token }}"
          }

          .\vcpkg\vcpkg fetch nuget | ForEach-Object { & $_ sources add `
            -Source "${{ env.FEED_URL }}" `
            -StorePasswordInClearText `
            -Name "GitHubPackages" `
            -UserName "${{ env.USERNAME }}" `
            -Password $patToken }

          .\vcpkg\vcpkg fetch nuget | ForEach-Object { & $_ setapikey $patToken -Source "${{ env.FEED_URL }}" }

      - name: Prepare vcpkg cache
        run: New-Item -ItemType Directory -Force -Path "${{ env.VCPKG_DEFAULT_BINARY_CACHE }}" | Out-Null

      - name: Configure CMake
        run: ./build-scripts/ci/configure-windows.ps1 -BuildDir build -Config Debug -EnableTests

      - name: Build
        run: cmake --build build --config Debug --parallel

      - name: Install OpenCppCoverage
        run: choco install opencppcoverage -y --no-progress

      - name: Run tests with coverage
        run: ./build-scripts/ci/run-windows-coverage.ps1 -BuildDir build -Config Debug -CoverageFile build/coverage/coverage.cobertura.xml -TimeoutSeconds 180
        timeout-minutes: 60

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-cpp-coverage
          path: build/coverage/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 7

      - name: Upload coverage to Codecov
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@v6.0.1
        with:
          files: build/coverage/coverage.cobertura.xml
          flags: windows-cpp
          name: windows-cpp
          fail_ci_if_error: true
          use_oidc: true

  cpp-compat:
    name: C++ ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'macos-15-intel' }}
    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg/archives,readwrite"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            triplet: x64-linux
          - os: macos-15-intel
            triplet: x64-osx
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libx11-dev libxrandr-dev libxext-dev libxtst-dev libxinerama-dev ninja-build

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          if ! command -v ninja &> /dev/null; then
            brew install ninja
          fi
          NINJA_PATH=$(command -v ninja)
          echo "$NINJA_PATH" >> $GITHUB_PATH
          echo "CMAKE_MAKE_PROGRAM=$NINJA_PATH" >> $GITHUB_ENV
          echo "MACOSX_DEPLOYMENT_TARGET=12" >> $GITHUB_ENV

      - name: Cache vcpkg binaries
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/vcpkg/archives
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Setup vcpkg
        run: bash ./build-scripts/ci/setup-vcpkg.sh

      - name: Prepare vcpkg cache
        run: mkdir -p "${{ github.workspace }}/vcpkg/archives"

      - name: Configure CMake
        run: bash ./build-scripts/ci/configure-unix.sh "${{ matrix.triplet }}" "Ninja" "build"

      - name: Build
        run: cmake --build build --parallel --target wingman_proto wingman_transport

  go-build:
    name: Go Server
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: orchestrator/server/go.sum

      - name: Test
        working-directory: orchestrator/server
        run: go test ./...
