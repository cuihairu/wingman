name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/workflows/docs.yml'
      - '.github/workflows/deploy-docs.yml'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: read

env:
  ACTIONS_NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg/archives
  USERNAME: ${{ github.repository_owner }}
  VCPKG_EXE: ${{ github.workspace }}/vcpkg/vcpkg
  FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
  VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,readwrite"

jobs:
  cpp-windows:
    name: C++ Windows
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache vcpkg binaries
        uses: actions/cache@v5
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Setup vcpkg
        run: ./build-scripts/ci/setup-vcpkg.ps1

      - name: Add NuGet sources (GitHub Packages)
        run: |
          $patToken = "${{ secrets.VCPKG_PAT_TOKEN }}"
          if ([string]::IsNullOrEmpty($patToken)) {
            Write-Host "VCPKG_PAT_TOKEN not found, using GITHUB_TOKEN"
            $patToken = "${{ github.token }}"
          }

          .\vcpkg\vcpkg fetch nuget | ForEach-Object { & $_ sources add `
            -Source "${{ env.FEED_URL }}" `
            -StorePasswordInClearText `
            -Name "GitHubPackages" `
            -UserName "${{ env.USERNAME }}" `
            -Password $patToken }

          .\vcpkg\vcpkg fetch nuget | ForEach-Object { & $_ setapikey $patToken -Source "${{ env.FEED_URL }}" }

      - name: Prepare vcpkg cache
        run: New-Item -ItemType Directory -Force -Path "${{ env.VCPKG_DEFAULT_BINARY_CACHE }}" | Out-Null

      - name: Configure CMake
        run: |
          $maxRetries = 3
          $retryCount = 0
          $success = $false

          while (-not $success -and $retryCount -lt $maxRetries) {
            $retryCount++
            Write-Host "Attempt $retryCount of $maxRetries..."

            try {
              ./build-scripts/ci/configure-windows.ps1 -BuildDir build -Config Debug -EnableTests
              if ($LASTEXITCODE -eq 0) {
                $success = $true
              } else {
                Write-Host "CMake configure failed with exit code $LASTEXITCODE"
                if ($retryCount -lt $maxRetries) {
                  Write-Host "Waiting 30 seconds before retry..."
                  Start-Sleep -Seconds 30
                }
              }
            } catch {
              Write-Host "Exception: $_"
              if ($retryCount -lt $maxRetries) {
                Write-Host "Waiting 30 seconds before retry..."
                Start-Sleep -Seconds 30
              }
            }
          }

          if (-not $success) {
            Write-Host "Failed after $maxRetries attempts"
            exit 1
          }

      - name: Build
        run: cmake --build build --config Debug --parallel

      - name: Install OpenCppCoverage
        run: choco install opencppcoverage -y --no-progress

      - name: Run tests with coverage
        run: ./build-scripts/ci/run-windows-coverage.ps1 -BuildDir build -Config Debug -CoverageFile build/coverage/coverage.cobertura.xml -TimeoutSeconds 180
        timeout-minutes: 60

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-cpp-coverage
          path: build/coverage/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 7

      - name: Upload coverage to Codecov
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@v6.0.1
        with:
          files: build/coverage/coverage.cobertura.xml
          flags: windows-cpp
          name: windows-cpp
          fail_ci_if_error: false
          use_oidc: true

  cpp-compat:
    name: C++ ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'macos-15-intel' }}
    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg/archives,readwrite"
      VCPKG_ASSET_SOURCES: "clear;files,${{ github.workspace }}/vcpkg/downloads,readwrite"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            triplet: x64-linux
          - os: macos-15-intel
            triplet: x64-osx
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libx11-dev libxrandr-dev libxext-dev libxtst-dev libxinerama-dev ninja-build

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          if ! command -v ninja &> /dev/null; then
            brew install ninja
          fi
          NINJA_PATH=$(command -v ninja)
          echo "$NINJA_PATH" >> $GITHUB_PATH
          echo "CMAKE_MAKE_PROGRAM=$NINJA_PATH" >> $GITHUB_ENV
          echo "MACOSX_DEPLOYMENT_TARGET=12" >> $GITHUB_ENV

      - name: Restore vcpkg cache
        id: cache-vcpkg
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ github.workspace }}/vcpkg/archives
            ${{ github.workspace }}/vcpkg/downloads
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Setup vcpkg
        run: bash ./build-scripts/ci/setup-vcpkg.sh

      - name: Prepare vcpkg cache
        run: mkdir -p "${{ github.workspace }}/vcpkg/archives" "${{ github.workspace }}/vcpkg/downloads"

      - name: Configure CMake
        run: |
          max_retries=3
          retry_count=0
          success=false

          while [ "$success" = "false" ] && [ $retry_count -lt $max_retries ]; do
            retry_count=$((retry_count + 1))
            echo "Attempt $retry_count of $max_retries..."

            if bash ./build-scripts/ci/configure-unix.sh "${{ matrix.triplet }}" "Ninja" "build"; then
              success=true
            else
              echo "CMake configure failed with exit code $?"
              if [ $retry_count -lt $max_retries ]; then
                echo "Waiting 30 seconds before retry..."
                sleep 30
              fi
            fi
          done

          if [ "$success" = "false" ]; then
            echo "Failed after $max_retries attempts"
            exit 1
          fi

      - name: Build
        run: cmake --build build --parallel --target wingman_proto wingman_transport

      - name: Save vcpkg cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            ${{ github.workspace }}/vcpkg/archives
            ${{ github.workspace }}/vcpkg/downloads
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}

  cpp-python:
    # 实验性 job：验证 WINGMAN_ENABLE_PYTHON（vcpkg CPython + pybind11 嵌入构建）
    # 在 CI 环境的可用性。Python 引擎默认关闭，此 job 仅用于回归 Python 绑层
    # （如 camelCase/snake_case 双注册），不阻塞主构建矩阵。
    name: C++ Windows (Python engine)
    runs-on: windows-2022
    continue-on-error: true
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Python (for CPython development headers/libs)
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache vcpkg binaries
        uses: actions/cache@v5
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: ${{ runner.os }}-vcpkg-python-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Setup vcpkg
        run: ./build-scripts/ci/setup-vcpkg.ps1

      - name: Add NuGet sources (GitHub Packages)
        run: |
          $patToken = "${{ secrets.VCPKG_PAT_TOKEN }}"
          if ([string]::IsNullOrEmpty($patToken)) {
            Write-Host "VCPKG_PAT_TOKEN not found, using GITHUB_TOKEN"
            $patToken = "${{ github.token }}"
          }

          .\vcpkg\vcpkg fetch nuget | ForEach-Object { & $_ sources add `
            -Source "${{ env.FEED_URL }}" `
            -StorePasswordInClearText `
            -Name "GitHubPackages" `
            -UserName "${{ env.USERNAME }}" `
            -Password $patToken }

          .\vcpkg\vcpkg fetch nuget | ForEach-Object { & $_ setapikey $patToken -Source "${{ env.FEED_URL }}" }

      - name: Prepare vcpkg cache
        run: New-Item -ItemType Directory -Force -Path "${{ env.VCPKG_DEFAULT_BINARY_CACHE }}" | Out-Null

      - name: Configure CMake (Python + tests enabled)
        run: ./build-scripts/ci/configure-windows.ps1 -BuildDir build -Config Debug -EnablePython -EnableTests

      - name: Build
        run: cmake --build build --config Debug --parallel

      - name: Run Python name-conversion tests
        # best-effort：构建通过即证明 WINGMAN_ENABLE_PYTHON 链路（pybind11 + CPython
        # + wingman_python + camelToSnake 双注册）可编译链接；测试可执行文件路径随
        # 生成器布局变化，找不到时降级为警告而非失败。
        continue-on-error: true
        run: |
          $testExe = Get-ChildItem -Path build -Recurse -Filter "python_name_conversion_tests.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($testExe) {
            Write-Host "Running $($testExe.FullName)"
            & $testExe.FullName
          } else {
            Write-Host "::warning::python_name_conversion_tests.exe not found; successful build already validates the Python link chain"
          }

  go-build:
    name: Go Server (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: orchestrator/server/go.sum

      - name: Vet
        working-directory: orchestrator/server
        run: go vet ./...

      - name: Build
        working-directory: orchestrator/server
        run: go build ./...

      - name: Test (with race detector)
        working-directory: orchestrator/server
        run: go test -race -count=1 ./...
