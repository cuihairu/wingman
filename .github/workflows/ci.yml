name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ========== C++ Build & Test ==========
  build-cpp:
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Cache vcpkg
      uses: actions/cache@v5
      id: vcpkg-cache
      with:
        path: |
          ${{ env.VCPKG_ROOT }}
          vcpkg/archives
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-

    - name: Setup vcpkg
      if: steps.vcpkg-cache.outputs.cache-hit != 'true'
      run: |
        Write-Host "Cloning vcpkg..."
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        .\bootstrap-vcpkg.bat

    - name: Install dependencies
      run: |
        $env:VCPKG_ROOT_ABS = (Resolve-Path "vcpkg").Path
        $env:VCPKG_DEFAULT_BINARY_CACHE = "$env:VCPKG_ROOT_ABS\archives"
        New-Item -ItemType Directory -Force -Path "$env:VCPKG_DEFAULT_BINARY_CACHE"
        .\vcpkg\vcpkg install

    - name: Configure CMake
      run: |
        $env:VCPKG_ROOT_ABS = (Resolve-Path "vcpkg").Path
        cmake -B build `
          -S . `
          -G "Visual Studio 17 2022" `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT_ABS/scripts/buildsystems/vcpkg.cmake" `
          -DCMAKE_BUILD_TYPE=Debug `
          -DWINGMAN_BUILD_TESTS=ON

    - name: Build
      run: cmake --build build --config Debug

    - name: Upload test artifacts
      uses: actions/upload-artifact@v6
      with:
        name: cpp-tests
        path: |
          build/client/tests/Debug/*.exe
          build/libs/*/tests/Debug/*.exe
        retention-days: 1

  test-cpp:
    needs: build-cpp
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install OpenCppCoverage
      run: choco install opencppcoverage -y

    - name: Download test artifacts
      uses: actions/download-artifact@v6
      with:
        name: cpp-tests
        path: build/tests

    - name: Run client tests with coverage
      run: |
        $openCppCoverage = "C:\Program Files\OpenCppCoverage\OpenCppCoverage.exe"
        if (-not (Test-Path $openCppCoverage)) {
          $openCppCoverage = "C:\Program Files (x86)\OpenCppCoverage\OpenCppCoverage.exe"
        }

        $workspace = ${{ github.workspace }}
        $workspace = $workspace -replace '/', '\'

        & $openCppCoverage `
          --sources "$workspace\client" `
          --excluded_sources "$workspace\client\tests" `
          --excluded_sources "$workspace\vcpkg" `
          --export_type=cobertura:coverage-client.xml `
          -- build/tests/client_tests.exe
        continue-on-error: true

    - name: Run libs tests with coverage
      run: |
        $openCppCoverage = "C:\Program Files\OpenCppCoverage\OpenCppCoverage.exe"
        if (-not (Test-Path $openCppCoverage)) {
          $openCppCoverage = "C:\Program Files (x86)\OpenCppCoverage\OpenCppCoverage.exe"
        }

        $workspace = ${{ github.workspace }}
        $workspace = $workspace -replace '/', '\'

        & $openCppCoverage `
          --sources "$workspace\libs" `
          --excluded_sources "$workspace\libs\*\tests" `
          --excluded_sources "$workspace\vcpkg" `
          --export_type=cobertura:coverage-libs.xml `
          -- build/tests/core_tests.exe
        continue-on-error: true

        & $openCppCoverage `
          --sources "$workspace\libs" `
          --excluded_sources "$workspace\libs\*\tests" `
          --excluded_sources "$workspace\vcpkg" `
          --export_type=cobertura:coverage-transport.xml `
          -- build/tests/transport_tests.exe
        continue-on-error: true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: |
          ./coverage-client.xml
          ./coverage-libs.xml
          ./coverage-transport.xml
        flags: client,libs
        name: cpp-coverage
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  # ========== Lua Tests ==========
  test-lua:
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install Lua
      run: choco install lua -y

    - name: Install LuaRocks
      run: |
        Invoke-WebRequest -Uri "https://luarocks.github.io/luarocks/releases/luarocks-3.11.1-windows-x86_64.zip" -OutFile luarocks.zip
        Expand-Archive luarocks.zip -DestinationPath .
        Move-Item luarocks-3.11.1-windows-x86_64 C:\luarocks
        $env:PATH += ";C:\luarocks"
        [Environment]::SetEnvironmentVariable("Path", $env:PATH, "Machine")

    - name: Install Busted
      run: |
        $env:PATH += ";C:\luarocks\bin;C:\Program Files\Lua\5.4"
        luarocks install busted

    - name: Run Lua tests
      run: |
        $env:PATH += ";C:\luarocks\bin;C:\Program Files\Lua\5.4"
        cd libs/lua/tests
        busted
      continue-on-error: true

  # ========== Go Test ==========
  test-go:
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Run Go tests
      run: |
        cd server
        go test -v -coverprofile=coverage.txt -covermode=atomic ./...
      continue-on-error: true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./server/coverage.txt
        flags: server
        name: go-coverage
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
