name: Build Package

on:
  workflow_call:
    inputs:
      version:
        description: 'Version string (e.g. v0.2.0 or 2026.06.07-nightly-abc1234)'
        required: true
        type: string
      version_suffix:
        description: 'Version suffix for CMake (e.g. 2026.06.07-nightly, empty for releases)'
        required: false
        type: string
        default: ''
      release_tag:
        description: 'GitHub release tag to upload artifacts to'
        required: true
        type: string
      prerelease:
        description: 'Mark release as prerelease'
        required: false
        type: boolean
        default: false

permissions:
  packages: write
  contents: write

env:
  ACTIONS_NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg/archives
  USERNAME: ${{ github.repository_owner }}
  VCPKG_EXE: ${{ github.workspace }}/vcpkg/vcpkg
  FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
  VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,readwrite"

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Cache vcpkg binaries
        uses: actions/cache@v5
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Setup vcpkg
        run: ./build-scripts/ci/setup-vcpkg.ps1

      - name: Add NuGet sources (GitHub Packages)
        run: |
          $patToken = "${{ secrets.VCPKG_PAT_TOKEN }}"
          if ([string]::IsNullOrEmpty($patToken)) {
            Write-Host "VCPKG_PAT_TOKEN not found, using GITHUB_TOKEN (may have limited permissions)"
            $patToken = "${{ github.token }}"
          }

          .\vcpkg\vcpkg fetch nuget | ForEach-Object { & $_ sources add `
            -Source "${{ env.FEED_URL }}" `
            -StorePasswordInClearText `
            -Name "GitHubPackages" `
            -UserName "${{ env.USERNAME }}" `
            -Password $patToken }

          .\vcpkg\vcpkg fetch nuget | ForEach-Object { & $_ setapikey $patToken -Source "${{ env.FEED_URL }}" }

      - name: Prepare vcpkg cache
        run: New-Item -ItemType Directory -Force -Path "${{ env.VCPKG_DEFAULT_BINARY_CACHE }}" | Out-Null

      - name: Configure CMake
        run: >
          ./build-scripts/ci/configure-windows.ps1
          -BuildDir build
          -Config Release
          -VersionSuffix "${{ inputs.version_suffix }}"

      - name: Build C++ Runtime
        run: cmake --build build --config Release --parallel

      # ====== Go Orchestrator Server ======
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: orchestrator/server/go.sum

      - name: Build Go Server
        working-directory: orchestrator/server
        run: go build -o ../../build/orchestrator-server.exe .

      # ====== Dashboard Frontend ======
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.ACTIONS_NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11

      - name: Build Dashboard
        working-directory: orchestrator/dashboard
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      # ====== Tauri GUI ======
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/gui/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/gui/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Tauri GUI
        working-directory: apps/gui
        run: |
          pnpm install --frozen-lockfile
          pnpm tauri build

      # ====== Package ======
      - name: Package build
        run: |
          $version = "${{ inputs.version }}"
          $distDir = "dist-wingman-$version"
          New-Item -ItemType Directory -Force -Path "$distDir" | Out-Null

          # C++ Runtime
          Copy-Item "build\apps\runtime\Release\wingman-runtime.exe" -Destination "$distDir\wingman.exe"

          # Go Orchestrator Server
          if (Test-Path "build\orchestrator-server.exe") {
            Copy-Item "build\orchestrator-server.exe" -Destination "$distDir\orchestrator-server.exe"
          }

          # Dashboard (built web assets)
          if (Test-Path "orchestrator\dashboard\dist") {
            New-Item -ItemType Directory -Force -Path "$distDir\dashboard" | Out-Null
            Copy-Item "orchestrator\dashboard\dist\*" -Destination "$distDir\dashboard\" -Recurse
          }

          # Tauri GUI installer
          $nsisDir = "apps\gui\src-tauri\target\release\bundle\nsis"
          if (Test-Path $nsisDir) {
            $installer = Get-ChildItem "$nsisDir\*.exe" | Select-Object -First 1
            if ($installer) {
              Copy-Item $installer.FullName -Destination "$distDir\$($installer.Name)"
            }
          }

          # Scripts
          if (Test-Path "scripts") {
            Copy-Item "scripts" -Destination "$distDir\" -Recurse
          }

          # Config examples
          if (Test-Path "apps\runtime\config") {
            New-Item -ItemType Directory -Force -Path "$distDir\config" | Out-Null
            Copy-Item "apps\runtime\config\*" -Destination "$distDir\config\" -Recurse
          }

          # Version info
          @"
          Wingman $version
          Build Date: $(Get-Date -Format "yyyy-MM-dd HH:mm:ss")
          Commit: ${{ github.sha }}
          Branch: ${{ github.ref_name }}

          Contents:
          - wingman.exe            : C++ Runtime (screen capture, input, scripting)
          - orchestrator-server.exe: Go Orchestrator Server
          - dashboard/             : Web Dashboard (static files)
          - Wingman_*_x64-setup.exe: Tauri GUI Installer
          - scripts/               : Example scripts
          - config/                : Configuration examples
          "@ | Out-File -FilePath "$distDir\VERSION.txt" -Encoding UTF8

          Compress-Archive -Path "$distDir\*" -DestinationPath "wingman-${version}-windows-x64.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: wingman-${{ inputs.version }}-windows-x64
          path: wingman-${{ inputs.version }}-windows-x64.zip
          retention-days: 30
          overwrite: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_tag }}
          body: |
            ## Wingman ${{ inputs.version }}

            ### Package Contents
            | File | Description |
            |------|-------------|
            | `wingman.exe` | C++ Runtime (screen capture, input simulation, Lua/Python scripting) |
            | `Wingman_*_x64-setup.exe` | Tauri GUI Installer |
            | `orchestrator-server.exe` | Go Orchestrator Server (agent management, workflow engine) |
            | `dashboard/` | Web Dashboard (static HTML/JS/CSS) |
            | `scripts/` | Example Lua/Python scripts |
            | `config/` | Configuration examples |
          files: wingman-${{ inputs.version }}-windows-x64.zip
          prerelease: ${{ inputs.prerelease }}
          draft: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Linux x64
    runs-on: ubuntu-latest
    env:
      VCPKG_BINARY_SOURCES: "clear"
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build ccache mono-complete
          sudo apt-get install -y libx11-dev libxrandr-dev libxext-dev libxtst-dev libxt-dev libxinerama-dev
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup vcpkg
        run: bash ./build-scripts/ci/setup-vcpkg.sh

      - name: Prepare vcpkg cache
        run: mkdir -p "${{ env.VCPKG_DEFAULT_BINARY_CACHE }}"

      - name: Configure CMake
        run: >
          bash ./build-scripts/ci/configure-unix.sh
          "x64-linux" "Ninja" "build" "Release" "${{ inputs.version_suffix }}"

      - name: Build C++ Runtime
        run: cmake --build build --config Release --parallel

      # ====== Go Orchestrator Server ======
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: orchestrator/server/go.sum

      - name: Build Go Server
        working-directory: orchestrator/server
        run: go build -o ../../build/orchestrator-server .

      # ====== Dashboard Frontend ======
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.ACTIONS_NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11

      - name: Build Dashboard
        working-directory: orchestrator/dashboard
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      # ====== Tauri GUI ======
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/gui/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/gui/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Tauri GUI
        working-directory: apps/gui
        run: |
          pnpm install --frozen-lockfile
          pnpm tauri build

      # ====== Package ======
      - name: Package
        run: |
          version="${{ inputs.version }}"
          distDir="dist-wingman-$version"
          mkdir -p "$distDir"

          cp build/apps/runtime/wingman-runtime "$distDir/wingman" || true
          cp build/orchestrator-server "$distDir/orchestrator-server" || true

          # Dashboard
          if [ -d "orchestrator/dashboard/dist" ]; then
            mkdir -p "$distDir/dashboard"
            cp -r orchestrator/dashboard/dist/* "$distDir/dashboard/"
          fi

          # Tauri GUI bundle (AppImage/deb)
          tauriBundleDir="apps/gui/src-tauri/target/release/bundle"
          if [ -d "$tauriBundleDir" ]; then
            find "$tauriBundleDir" -name "*.AppImage" -exec cp {} "$distDir/" \;
            find "$tauriBundleDir" -name "*.deb" -exec cp {} "$distDir/" \;
          fi

          [ -d scripts ] && cp -r scripts "$distDir/"
          [ -d apps/runtime/config ] && mkdir -p "$distDir/config" && cp -r apps/runtime/config/* "$distDir/config/"

          cat > "$distDir/VERSION.txt" << EOF
          Wingman $version
          Build Date: $(date)
          Commit: ${{ github.sha }}
          Platform: Linux x64
          EOF

          tar czf "wingman-${version}-linux-x64.tar.gz" -C "$distDir" .

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: wingman-${{ inputs.version }}-linux-x64
          path: wingman-${{ inputs.version }}-linux-x64.tar.gz
          retention-days: 30
          overwrite: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_tag }}
          body: |
            See Windows job for full release notes.
          files: wingman-${{ inputs.version }}-linux-x64.tar.gz
          prerelease: ${{ inputs.prerelease }}
          draft: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: macOS x64
    runs-on: macos-15-intel
    env:
      VCPKG_BINARY_SOURCES: "clear"
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: brew install cmake ninja mono

      - name: Setup vcpkg
        run: bash ./build-scripts/ci/setup-vcpkg.sh

      - name: Prepare vcpkg cache
        run: mkdir -p "${{ env.VCPKG_DEFAULT_BINARY_CACHE }}"

      - name: Configure CMake
        run: >
          bash ./build-scripts/ci/configure-unix.sh
          "x64-osx" "Ninja" "build" "Release" "${{ inputs.version_suffix }}"

      - name: Build C++ Runtime
        run: cmake --build build --config Release --parallel

      # ====== Go Orchestrator Server ======
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: orchestrator/server/go.sum

      - name: Build Go Server
        working-directory: orchestrator/server
        run: go build -o ../../build/orchestrator-server .

      # ====== Dashboard Frontend ======
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.ACTIONS_NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11

      - name: Build Dashboard
        working-directory: orchestrator/dashboard
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      # ====== Tauri GUI ======
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/gui/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/gui/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Tauri GUI
        working-directory: apps/gui
        run: |
          pnpm install --frozen-lockfile
          pnpm tauri build

      # ====== Package ======
      - name: Package
        run: |
          version="${{ inputs.version }}"
          distDir="dist-wingman-$version"
          mkdir -p "$distDir"

          cp build/apps/runtime/wingman-runtime "$distDir/wingman" || true
          cp build/orchestrator-server "$distDir/orchestrator-server" || true

          # Dashboard
          if [ -d "orchestrator/dashboard/dist" ]; then
            mkdir -p "$distDir/dashboard"
            cp -r orchestrator/dashboard/dist/* "$distDir/dashboard/"
          fi

          # Tauri GUI bundle (dmg/app)
          tauriBundleDir="apps/gui/src-tauri/target/release/bundle"
          if [ -d "$tauriBundleDir" ]; then
            find "$tauriBundleDir" -name "*.dmg" -exec cp {} "$distDir/" \;
            find "$tauriBundleDir" -name "*.app" -exec cp -r {} "$distDir/" \;
          fi

          [ -d scripts ] && cp -r scripts "$distDir/"
          [ -d apps/runtime/config ] && mkdir -p "$distDir/config" && cp -r apps/runtime/config/* "$distDir/config/"

          cat > "$distDir/VERSION.txt" << EOF
          Wingman $version
          Build Date: $(date)
          Commit: ${{ github.sha }}
          Platform: macOS x64
          EOF

          tar czf "wingman-${version}-macos-x64.tar.gz" -C "$distDir" .

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: wingman-${{ inputs.version }}-macos-x64
          path: wingman-${{ inputs.version }}-macos-x64.tar.gz
          retention-days: 30
          overwrite: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_tag }}
          body: |
            See Windows job for full release notes.
          files: wingman-${{ inputs.version }}-macos-x64.tar.gz
          prerelease: ${{ inputs.prerelease }}
          draft: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
