name: Deploy Server & Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'orchestrator/server/**'
      - 'orchestrator/dashboard/**'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch:

env:
  ACTIONS_NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  SERVER_IMAGE: ${{ github.repository_owner }}/wingman-server
  DASHBOARD_IMAGE: ${{ github.repository_owner }}/wingman-dashboard

permissions:
  contents: read
  packages: write
  deployments: write

jobs:
  deploy-server:
    name: Deploy Server
    runs-on: [self-hosted, wingman]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        timeout-minutes: 5
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        timeout-minutes: 3
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        timeout-minutes: 3
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        timeout-minutes: 45
        uses: docker/build-push-action@v5
        with:
          context: ./orchestrator/server
          file: ./orchestrator/server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to runner-docker
        if: success()
        env:
          WINGMAN_JWT_SECRET: ${{ secrets.WINGMAN_JWT_SECRET }}
          WINGMAN_ADMIN_PASSWORD: ${{ secrets.WINGMAN_ADMIN_PASSWORD }}
        run: |
          echo "Deploying server to runner-docker..."

          if [ -z "$WINGMAN_JWT_SECRET" ]; then
            echo "::error::WINGMAN_JWT_SECRET is not set. Configure it in Settings > Secrets > Actions."
            exit 1
          fi

          # Ensure the shared network exists (so dashboard can reach server by name)
          docker network create wingman-net 2>/dev/null || true

          # Stop and remove existing container if running
          docker stop wingman-server 2>/dev/null || true
          docker rm wingman-server 2>/dev/null || true

          # Pull the latest image
          docker pull ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE }}:latest

          # Run the container
          docker run -d \
            --name wingman-server \
            --network wingman-net \
            --restart unless-stopped \
            -p 9527:9527 \
            -p 8888:8888 \
            -v wingman-data:/app/data \
            -v wingman-scripts:/app/scripts \
            -e WINGMAN_JWT_SECRET="$WINGMAN_JWT_SECRET" \
            -e WINGMAN_ADMIN_PASSWORD="$WINGMAN_ADMIN_PASSWORD" \
            -e WINGMAN_HOST=0.0.0.0 \
            -e WINGMAN_PORT=9527 \
            -e WINGMAN_DB_PATH=/app/data/wingman.db \
            -e WINGMAN_AGENT_ADDR=0.0.0.0:8888 \
            -e WINGMAN_SCRIPTS_DIR=/app/scripts \
            ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE }}:latest

          # Wait for container to start and check health
          echo "Waiting for server to start..."
          for i in $(seq 1 30); do
            if docker ps --filter name=wingman-server --filter health=healthy -q | grep -q .; then
              echo "Server is healthy!"
              docker ps | grep wingman-server
              echo "Deployment completed successfully"
              exit 0
            fi
            if ! docker ps --filter name=wingman-server -q | grep -q .; then
              echo "::error::Container exited unexpectedly"
              docker logs wingman-server 2>&1 | tail -20
              exit 1
            fi
            sleep 1
          done

          echo "::warning::Server not healthy within 30s, showing logs"
          docker logs wingman-server 2>&1 | tail -20
          docker ps | grep wingman-server

  deploy-dashboard:
    name: Deploy Dashboard
    needs: deploy-server
    runs-on: [self-hosted, wingman]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        timeout-minutes: 5
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        timeout-minutes: 3
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        timeout-minutes: 3
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.DASHBOARD_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        timeout-minutes: 15
        uses: docker/build-push-action@v5
        with:
          context: ./orchestrator/dashboard
          file: ./orchestrator/dashboard/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to runner-docker
        if: success()
        run: |
          echo "Deploying dashboard to runner-docker..."

          # Ensure the shared network exists (so dashboard can reach server by name)
          docker network create wingman-net 2>/dev/null || true

          # Stop and remove existing container if running
          docker stop wingman-dashboard 2>/dev/null || true
          docker rm wingman-dashboard 2>/dev/null || true

          # Pull the latest image
          docker pull ${{ env.REGISTRY }}/${{ env.DASHBOARD_IMAGE }}:latest

          # Run the container
          docker run -d \
            --name wingman-dashboard \
            --network wingman-net \
            --restart unless-stopped \
            -p 8080:80 \
            ${{ env.REGISTRY }}/${{ env.DASHBOARD_IMAGE }}:latest

          # Wait for container to start
          echo "Waiting for dashboard to start..."
          timeout 30 sh -c 'until docker ps | grep wingman-dashboard; do sleep 1; done'

          # Verify the API proxy reaches wingman-server (401/404/405 = gin responded;
          # 502/503/000 = proxy broken). Retry since nginx may take a moment to start.
          echo "Verifying API proxy -> wingman-server..."
          code=000
          for i in $(seq 1 15); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 3 \
              http://localhost:8080/api/v1/auth/login || echo 000)
            case "$code" in
              502|503|000) sleep 2 ;;
              *) echo "Dashboard API proxy OK (HTTP $code)"; break ;;
            esac
          done
          if [ "$code" = "502" ] || [ "$code" = "503" ] || [ "$code" = "000" ]; then
            echo "::error::Dashboard API proxy not reaching wingman-server (HTTP $code)"
            docker logs wingman-dashboard 2>&1 | tail -20
            exit 1
          fi

          # Show container status
          docker ps | grep wingman-dashboard

          echo "Dashboard deployment completed successfully"
