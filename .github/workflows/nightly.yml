name: Nightly Build

on:
  schedule:
    - cron: '0 20 * * *' # UTC 20:00 = 北京时间次日 04:00
  workflow_dispatch:

permissions:
  packages: write
  contents: write

jobs:
  check-activity:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check if repo has recent activity
        id: check
        run: |
          # 获取最近 commit 的时间
          LAST_COMMIT=$(gh api repos/${{ github.repository }}/commits/main --jq '.commit.author.date' 2>/dev/null || echo "")
          if [ -z "$LAST_COMMIT" ]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "No commits found on main"
            exit 0
          fi

          # 计算距今天数
          SECONDS_SINCE=$(($(date +%s) - $(date -d "$LAST_COMMIT" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$LAST_COMMIT" +%s)))
          DAYS_SINCE=$((SECONDS_SINCE / 86400))

          echo "Last commit: $LAST_COMMIT ($DAYS_SINCE days ago)"

          if [ $DAYS_SINCE -le 7 ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "Skipping: last commit was $DAYS_SINCE days ago (> 7 days)"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  resolve-version:
    needs: check-activity
    if: needs.check-activity.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      version_suffix: ${{ steps.ver.outputs.version_suffix }}
    steps:
      - name: Generate nightly version
        id: ver
        run: |
          date=$(date +%Y.%m.%d)
          commit="${{ github.sha }}"
          short="${commit:0:7}"
          echo "version=${date}-nightly-${short}" >> $GITHUB_OUTPUT
          echo "version_suffix=${date}-nightly" >> $GITHUB_OUTPUT

  build:
    name: Nightly Build & Release
    needs: resolve-version
    uses: ./.github/workflows/build-package.yml
    with:
      version: ${{ needs.resolve-version.outputs.version }}
      version_suffix: ${{ needs.resolve-version.outputs.version_suffix }}
      release_tag: nightly
      prerelease: true
