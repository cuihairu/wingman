name: Nightly Build

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  packages: write
  contents: write

env:
  ACTIONS_NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg/archives
  USERNAME: ${{ github.repository_owner }}
  VCPKG_EXE: ${{ github.workspace }}/vcpkg/vcpkg
  FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
  VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,readwrite"

jobs:
  nightly-windows:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Get nightly version
        id: nightly_version
        run: |
          $date = Get-Date -Format "yyyy.MM.dd"
          $commit = git rev-parse --short HEAD
          echo "version=$date-nightly-$commit" >> $env:GITHUB_OUTPUT
          echo "version_suffix=$date-nightly" >> $env:GITHUB_OUTPUT

      - name: Cache vcpkg binaries
        uses: actions/cache@v5
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Setup vcpkg
        run: ./build-scripts/ci/setup-vcpkg.ps1

      - name: Add NuGet sources (GitHub Packages)
        run: |
          $patToken = "${{ secrets.VCPKG_PAT_TOKEN }}"
          if ([string]::IsNullOrEmpty($patToken)) {
            Write-Host "VCPKG_PAT_TOKEN not found, using GITHUB_TOKEN (may have limited permissions)"
            $patToken = "${{ github.token }}"
          }

          .\vcpkg\vcpkg fetch nuget | ForEach-Object { & $_ sources add `
            -Source "${{ env.FEED_URL }}" `
            -StorePasswordInClearText `
            -Name "GitHubPackages" `
            -UserName "${{ env.USERNAME }}" `
            -Password $patToken }

          .\vcpkg\vcpkg fetch nuget | ForEach-Object { & $_ setapikey $patToken -Source "${{ env.FEED_URL }}" }

      - name: Prepare vcpkg cache
        run: New-Item -ItemType Directory -Force -Path "${{ env.VCPKG_DEFAULT_BINARY_CACHE }}" | Out-Null

      - name: Configure CMake with nightly version
        run: ./build-scripts/ci/configure-windows.ps1 -BuildDir build -Config Release -VersionSuffix "${{ steps.nightly_version.outputs.version_suffix }}"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package nightly build
        run: |
          $version = "${{ steps.nightly_version.outputs.version }}"
          $distDir = "dist-wingman-$version"
          New-Item -ItemType Directory -Force -Path "$distDir" | Out-Null

          Copy-Item "build\apps\runtime\Release\wingman-runtime.exe" -Destination "$distDir\wingman.exe"

          if (Test-Path "scripts") {
            Copy-Item "scripts" -Destination "$distDir\" -Recurse
          }

          @"
          Wingman $version
          Build Date: $(Get-Date -Format "yyyy-MM-dd HH:mm:ss")
          Commit: ${{ steps.nightly_version.outputs.version }}
          Branch: nightly
          "@ | Out-File -FilePath "$distDir\VERSION.txt" -Encoding UTF8

          Compress-Archive -Path "$distDir\*" -DestinationPath "wingman-nightly-windows-x64.zip"

      - name: Upload nightly artifacts
        uses: actions/upload-artifact@v6
        with:
          name: wingman-nightly-windows-x64
          path: wingman-nightly-windows-x64.zip
          retention-days: 30
          overwrite: true

      - name: Create GitHub Release (nightly)
        uses: softprops/action-gh-release@v3
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: nightly
          name: "Nightly Build"
          body: |
            ## Nightly Build

            This is an automated nightly build (overwrites daily).
            **Not recommended for production use.**

            ### Latest Build
            - Date: ${{ steps.nightly_version.outputs.version_suffix }}
            - Commit: ${{ steps.nightly_version.outputs.version }}
            - Download: `wingman-nightly-windows-x64.zip`

            ---
            *Use at your own risk. Nightly builds may contain unstable features.*
          files: wingman-nightly-windows-x64.zip
          prerelease: true
          draft: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  nightly-linux:
    runs-on: ubuntu-latest
    env:
      VCPKG_BINARY_SOURCES: "clear"
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Get nightly version
        id: nightly_version
        run: |
          date=$(date +%Y.%m.%d)
          commit=$(git rev-parse --short HEAD)
          echo "version=$date-nightly-$commit" >> $GITHUB_OUTPUT
          echo "version_suffix=$date-nightly" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build ccache mono-complete
          sudo apt-get install -y libx11-dev libxrandr-dev libxext-dev libxtst-dev libxt-dev libxinerama-dev

      - name: Setup vcpkg
        run: bash ./build-scripts/ci/setup-vcpkg.sh

      - name: Prepare vcpkg cache
        run: mkdir -p "${{ env.VCPKG_DEFAULT_BINARY_CACHE }}"

      - name: Configure CMake with nightly version
        run: bash ./build-scripts/ci/configure-unix.sh "x64-linux" "Ninja" "build" "Release" "${{ steps.nightly_version.outputs.version_suffix }}"

      - name: Build
        run: cmake --build build --config Release --parallel --target wingman_proto wingman_transport

      - name: Upload nightly artifacts
        uses: actions/upload-artifact@v6
        with:
          name: wingman-nightly-linux-compat-build
          path: |
            build/libs/proto
            build/libs/transport
          if-no-files-found: error
          retention-days: 7

  nightly-macos:
    runs-on: macos-latest
    env:
      VCPKG_BINARY_SOURCES: "clear"
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Get nightly version
        id: nightly_version
        run: |
          date=$(date +%Y.%m.%d)
          commit=$(git rev-parse --short HEAD)
          echo "version=$date-nightly-$commit" >> $GITHUB_OUTPUT
          echo "version_suffix=$date-nightly" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: brew install cmake ninja mono

      - name: Setup vcpkg
        run: bash ./build-scripts/ci/setup-vcpkg.sh

      - name: Prepare vcpkg cache
        run: mkdir -p "${{ env.VCPKG_DEFAULT_BINARY_CACHE }}"

      - name: Configure CMake with nightly version
        run: bash ./build-scripts/ci/configure-unix.sh "x64-osx" "Ninja" "build" "Release" "${{ steps.nightly_version.outputs.version_suffix }}"

      - name: Build
        run: cmake --build build --config Release --parallel --target wingman_proto wingman_transport

      - name: Upload nightly artifacts
        uses: actions/upload-artifact@v6
        with:
          name: wingman-nightly-macos-compat-build
          path: |
            build/libs/proto
            build/libs/transport
          if-no-files-found: error
          retention-days: 7
