name: Nightly Build

on:
  schedule:
    - cron: '0 20 * * *' # UTC 20:00 = 北京时间次日 04:00
  workflow_dispatch:

permissions:
  packages: write
  contents: write

env:
  ACTIONS_NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg/archives
  USERNAME: ${{ github.repository_owner }}
  VCPKG_EXE: ${{ github.workspace }}/vcpkg/vcpkg
  FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
  VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,readwrite"

jobs:
  check-activity:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check if repo has recent activity
        id: check
        run: |
          # 获取最近 commit 的时间
          LAST_COMMIT=$(gh api repos/${{ github.repository }}/commits/main --jq '.commit.author.date' 2>/dev/null || echo "")
          if [ -z "$LAST_COMMIT" ]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "No commits found on main"
            exit 0
          fi

          # 计算距今天数
          SECONDS_SINCE=$(($(date +%s) - $(date -d "$LAST_COMMIT" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$LAST_COMMIT" +%s)))
          DAYS_SINCE=$((SECONDS_SINCE / 86400))

          echo "Last commit: $LAST_COMMIT ($DAYS_SINCE days ago)"

          if [ $DAYS_SINCE -le 7 ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "Skipping: last commit was $DAYS_SINCE days ago (> 7 days)"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  nightly-windows:
    needs: check-activity
    if: needs.check-activity.outputs.should_run == 'true'
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Get nightly version
        id: nightly_version
        run: |
          $date = Get-Date -Format "yyyy.MM.dd"
          $commit = git rev-parse --short HEAD
          echo "version=$date-nightly-$commit" >> $env:GITHUB_OUTPUT
          echo "version_suffix=$date-nightly" >> $env:GITHUB_OUTPUT

      - name: Cache vcpkg binaries
        uses: actions/cache@v5
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Setup vcpkg
        run: ./build-scripts/ci/setup-vcpkg.ps1

      - name: Add NuGet sources (GitHub Packages)
        run: |
          $patToken = "${{ secrets.VCPKG_PAT_TOKEN }}"
          if ([string]::IsNullOrEmpty($patToken)) {
            Write-Host "VCPKG_PAT_TOKEN not found, using GITHUB_TOKEN (may have limited permissions)"
            $patToken = "${{ github.token }}"
          }

          .\vcpkg\vcpkg fetch nuget | ForEach-Object { & $_ sources add `
            -Source "${{ env.FEED_URL }}" `
            -StorePasswordInClearText `
            -Name "GitHubPackages" `
            -UserName "${{ env.USERNAME }}" `
            -Password $patToken }

          .\vcpkg\vcpkg fetch nuget | ForEach-Object { & $_ setapikey $patToken -Source "${{ env.FEED_URL }}" }

      - name: Prepare vcpkg cache
        run: New-Item -ItemType Directory -Force -Path "${{ env.VCPKG_DEFAULT_BINARY_CACHE }}" | Out-Null

      - name: Configure CMake with nightly version
        run: ./build-scripts/ci/configure-windows.ps1 -BuildDir build -Config Release -VersionSuffix "${{ steps.nightly_version.outputs.version_suffix }}"

      - name: Build C++ Runtime
        run: cmake --build build --config Release --parallel

      # ====== Go Orchestrator Server ======
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: orchestrator/server/go.sum

      - name: Build Go Server
        working-directory: orchestrator/server
        run: |
          go build -o ../../build/orchestrator-server.exe .

      # ====== Dashboard Frontend ======
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.ACTIONS_NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Build Dashboard
        working-directory: orchestrator/dashboard
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      # ====== Package ======
      - name: Package nightly build
        run: |
          $version = "${{ steps.nightly_version.outputs.version }}"
          $distDir = "dist-wingman-$version"
          New-Item -ItemType Directory -Force -Path "$distDir" | Out-Null

          # C++ Runtime
          Copy-Item "build\apps\runtime\Release\wingman-runtime.exe" -Destination "$distDir\wingman.exe"

          # Go Orchestrator Server
          if (Test-Path "build\orchestrator-server.exe") {
            Copy-Item "build\orchestrator-server.exe" -Destination "$distDir\orchestrator-server.exe"
          }

          # Dashboard (built web assets)
          if (Test-Path "orchestrator\dashboard\dist") {
            New-Item -ItemType Directory -Force -Path "$distDir\dashboard" | Out-Null
            Copy-Item "orchestrator\dashboard\dist\*" -Destination "$distDir\dashboard\" -Recurse
          }

          # Scripts
          if (Test-Path "scripts") {
            Copy-Item "scripts" -Destination "$distDir\" -Recurse
          }

          # Config examples
          if (Test-Path "apps\runtime\config") {
            New-Item -ItemType Directory -Force -Path "$distDir\config" | Out-Null
            Copy-Item "apps\runtime\config\*" -Destination "$distDir\config\" -Recurse
          }

          # Version info
          @"
          Wingman $version
          Build Date: $(Get-Date -Format "yyyy-MM-dd HH:mm:ss")
          Commit: ${{ steps.nightly_version.outputs.version }}
          Branch: main

          Contents:
          - wingman.exe           : C++ Runtime (screen capture, input, scripting)
          - orchestrator-server.exe: Go Orchestrator Server
          - dashboard/             : Web Dashboard (static files)
          - scripts/               : Example scripts
          - config/                : Configuration examples
          "@ | Out-File -FilePath "$distDir\VERSION.txt" -Encoding UTF8

          Compress-Archive -Path "$distDir\*" -DestinationPath "wingman-nightly-windows-x64.zip"

      - name: Upload nightly artifacts
        uses: actions/upload-artifact@v6
        with:
          name: wingman-nightly-windows-x64
          path: wingman-nightly-windows-x64.zip
          retention-days: 30
          overwrite: true

      - name: Create GitHub Release (nightly)
        uses: softprops/action-gh-release@v3
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: nightly
          name: "Nightly Build"
          body: |
            ## Nightly Build

            This is an automated nightly build (overwrites daily).
            **Not recommended for production use.**

            ### Latest Build
            - Date: ${{ steps.nightly_version.outputs.version_suffix }}
            - Commit: ${{ steps.nightly_version.outputs.version }}
            - Download: `wingman-nightly-windows-x64.zip`

            ### Package Contents
            | File | Description |
            |------|-------------|
            | `wingman.exe` | C++ Runtime (screen capture, input simulation, Lua/Python scripting) |
            | `orchestrator-server.exe` | Go Orchestrator Server (agent management, workflow engine) |
            | `dashboard/` | Web Dashboard (static HTML/JS/CSS) |
            | `scripts/` | Example Lua/Python scripts |
            | `config/` | Configuration examples |

            ---
            *Use at your own risk. Nightly builds may contain unstable features.*
          files: wingman-nightly-windows-x64.zip
          prerelease: true
          draft: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  nightly-linux:
    needs: check-activity
    if: needs.check-activity.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    env:
      VCPKG_BINARY_SOURCES: "clear"
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Get nightly version
        id: nightly_version
        run: |
          date=$(date +%Y.%m.%d)
          commit=$(git rev-parse --short HEAD)
          echo "version=$date-nightly-$commit" >> $GITHUB_OUTPUT
          echo "version_suffix=$date-nightly" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build ccache mono-complete
          sudo apt-get install -y libx11-dev libxrandr-dev libxext-dev libxtst-dev libxt-dev libxinerama-dev

      - name: Setup vcpkg
        run: bash ./build-scripts/ci/setup-vcpkg.sh

      - name: Prepare vcpkg cache
        run: mkdir -p "${{ env.VCPKG_DEFAULT_BINARY_CACHE }}"

      - name: Configure CMake with nightly version
        run: bash ./build-scripts/ci/configure-unix.sh "x64-linux" "Ninja" "build" "Release" "${{ steps.nightly_version.outputs.version_suffix }}"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Build Go Server
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: orchestrator/server/go.sum

      - name: Build Go Server binary
        working-directory: orchestrator/server
        run: go build -o ../../build/orchestrator-server .

      - name: Package
        run: |
          version="${{ steps.nightly_version.outputs.version }}"
          distDir="dist-wingman-$version"
          mkdir -p "$distDir"

          cp build/apps/runtime/wingman-runtime "$distDir/wingman" || true
          cp build/orchestrator-server "$distDir/orchestrator-server" || true

          [ -d scripts ] && cp -r scripts "$distDir/"
          [ -d apps/runtime/config ] && mkdir -p "$distDir/config" && cp -r apps/runtime/config/* "$distDir/config/"

          cat > "$distDir/VERSION.txt" << EOF
          Wingman $version
          Build Date: $(date)
          Commit: ${{ steps.nightly_version.outputs.version }}
          Platform: Linux x64
          EOF

          tar czf wingman-nightly-linux-x64.tar.gz -C "$distDir" .

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: wingman-nightly-linux-x64
          path: wingman-nightly-linux-x64.tar.gz
          retention-days: 30
          overwrite: true

      - name: Create GitHub Release (nightly)
        uses: softprops/action-gh-release@v3
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: nightly
          name: "Nightly Build"
          body: |
            ## Nightly Build (${{ steps.nightly_version.outputs.version_suffix }})

            See Windows job for full release notes.
          files: wingman-nightly-linux-x64.tar.gz
          prerelease: true
          draft: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  nightly-macos:
    needs: check-activity
    if: needs.check-activity.outputs.should_run == 'true'
    runs-on: macos-latest
    env:
      VCPKG_BINARY_SOURCES: "clear"
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Get nightly version
        id: nightly_version
        run: |
          date=$(date +%Y.%m.%d)
          commit=$(git rev-parse --short HEAD)
          echo "version=$date-nightly-$commit" >> $GITHUB_OUTPUT
          echo "version_suffix=$date-nightly" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: brew install cmake ninja mono

      - name: Setup vcpkg
        run: bash ./build-scripts/ci/setup-vcpkg.sh

      - name: Prepare vcpkg cache
        run: mkdir -p "${{ env.VCPKG_DEFAULT_BINARY_CACHE }}"

      - name: Configure CMake with nightly version
        run: bash ./build-scripts/ci/configure-unix.sh "x64-osx" "Ninja" "build" "Release" "${{ steps.nightly_version.outputs.version_suffix }}"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Build Go Server
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: orchestrator/server/go.sum

      - name: Build Go Server binary
        working-directory: orchestrator/server
        run: go build -o ../../build/orchestrator-server .

      - name: Package
        run: |
          version="${{ steps.nightly_version.outputs.version }}"
          distDir="dist-wingman-$version"
          mkdir -p "$distDir"

          cp build/apps/runtime/wingman-runtime "$distDir/wingman" || true
          cp build/orchestrator-server "$distDir/orchestrator-server" || true

          [ -d scripts ] && cp -r scripts "$distDir/"
          [ -d apps/runtime/config ] && mkdir -p "$distDir/config" && cp -r apps/runtime/config/* "$distDir/config/"

          cat > "$distDir/VERSION.txt" << EOF
          Wingman $version
          Build Date: $(date)
          Commit: ${{ steps.nightly_version.outputs.version }}
          Platform: macOS x64
          EOF

          tar czf wingman-nightly-macos-x64.tar.gz -C "$distDir" .

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: wingman-nightly-macos-x64
          path: wingman-nightly-macos-x64.tar.gz
          retention-days: 30
          overwrite: true

      - name: Create GitHub Release (nightly)
        uses: softprops/action-gh-release@v3
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: nightly
          name: "Nightly Build"
          body: |
            ## Nightly Build (${{ steps.nightly_version.outputs.version_suffix }})

            See Windows job for full release notes.
          files: wingman-nightly-macos-x64.tar.gz
          prerelease: true
          draft: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
